const PaketSiparis = ({ isletmeId, kullaniciId, menu, setSatislar, accent, kategoriler }) => {
  const [siparisler, setSiparisler] = useState([]);
  const [yeniModal, setYeniModal] = useState(false);
  const [aktifKat, setAktifKat] = useState("tum");
  const [form, setForm] = useState({ musteri:"", telefon:"", adres:"", not:"", kaynak:"telefon" });
  const [sepet, setSepet] = useState([]);
  const [detayId, setDetayId] = useState(null);
  const kaynaklar = ["telefon","yemeksepeti","getir","trendyol","diger"];
  const kaynakRenk = {telefon:C.accent,yemeksepeti:"#e8a830",getir:"#e05252",trendyol:"#7b68ee",diger:C.muted};
  useEffect(() => { veriYukle(); }, []);
  const veriYukle = async () => { const {data}=await sb.from("paket_siparisler").select("*").eq("isletme_id",isletmeId).eq("durum","acik").order("tarih",{ascending:false}); setSiparisler(data||[]); };
  const sepetEkle = (m) => { const v=sepet.find(x=>x.menuId===m.id); if(v)setSepet(s=>s.map(x=>x.menuId===m.id?{...x,qty:x.qty+1}:x));else setSepet(s=>[...s,{menuId:m.id,ad:m.ad,fiyat:m.fiyat,qty:1}]); };
  const sepetCikar = (id) => setSepet(s=>s.map(x=>x.menuId===id?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));
  const siparisKaydet = async () => {
    if (!form.musteri||!sepet.length) return;
    const toplam=sepet.reduce((t,x)=>t+x.fiyat*x.qty,0);
    const {data}=await sb.from("paket_siparisler").insert({isletme_id:isletmeId,kullanici_id:kullaniciId,musteri_ad:form.musteri,telefon:form.telefon,adres:form.adres,siparis_notu:form.not,kaynak:form.kaynak,items:sepet,toplam,durum:"acik",tarih:new Date().toISOString()}).select().single();
    setSiparisler(s=>[data,...s]); setYeniModal(false); setSepet([]); setForm({musteri:"",telefon:"",adres:"",not:"",kaynak:"telefon"});
  };
  const durumGuncelle = async (id, durum) => {
    await sb.from("paket_siparisler").update({durum}).eq("id",id);
    if (durum==="teslim") { const s=siparisler.find(x=>x.id===id); const {data:satis}=await sb.from("satislar").insert({isletme_id:isletmeId,kullanici_id:kullaniciId,items:s.items,toplam:s.toplam,tarih:new Date().toISOString(),masa:"Paket - "+s.musteri_ad+" ("+s.kaynak+")",odeme_tipi:"nakit"}).select().single(); setSatislar(sv=>[...sv,satis]); setSiparisler(sv=>sv.filter(x=>x.id!==id)); }
    else setSiparisler(sv=>sv.map(x=>x.id===id?{...x,durum}:x));
    setDetayId(null);
  };
  const sipToplam=sepet.reduce((t,x)=>t+x.fiyat*x.qty,0);
  const durumRenk={acik:C.accent,hazirlaniyor:"#e8a830",yolda:"#7b68ee",teslim:C.green};
  const durumLabel={acik:"Yeni",hazirlaniyor:"Hazirlaniyor",yolda:"Yolda",teslim:"Teslim"};
  return (
    <div className="fade-in" style={{ padding:16 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
        <span style={{ fontFamily:"Syne",fontSize:20,fontWeight:700 }}>Paket Siparisler</span>
        <Btn small onClick={() => setYeniModal(true)}>+ Yeni</Btn>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14 }}>
        <Card><div style={{ fontSize:20,fontWeight:700,color:C.accent }}>{siparisler.length}</div><div style={{ fontSize:11,color:C.muted }}>Aktif</div></Card>
        <Card><div style={{ fontSize:20,fontWeight:700,color:C.green }}>TL{siparisler.reduce((t,s)=>t+s.toplam,0).toLocaleString()}</div><div style={{ fontSize:11,color:C.muted }}>Toplam</div></Card>
      </div>
      <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
        {siparisler.map(s=>(
          <Card key={s.id} style={{ border:"1px solid "+(durumRenk[s.durum]||C.border)+"44" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
              <div>
                <div style={{ fontWeight:700,fontSize:15 }}>{s.musteri_ad}</div>
                {s.telefon&&<div style={{ fontSize:12,color:C.muted }}>📞 {s.telefon}</div>}
                {s.adres&&<div style={{ fontSize:12,color:C.muted }}>📍 {s.adres}</div>}
                <div style={{ display:"flex",gap:6,marginTop:4,flexWrap:"wrap" }}>
                  <Badge color={durumRenk[s.durum]||C.muted}>{durumLabel[s.durum]||s.durum}</Badge>
                  {s.kaynak&&<Badge color={kaynakRenk[s.kaynak]||C.muted}>{s.kaynak}</Badge>}
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontFamily:"Syne",fontSize:18,fontWeight:700,color:C.accent }}>TL{s.toplam.toLocaleString()}</div>
                <div style={{ fontSize:11,color:C.muted }}>{new Date(s.tarih).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})}</div>
              </div>
            </div>
            <div style={{ display:"flex",gap:6,marginTop:10,flexWrap:"wrap" }}>
              {s.durum==="acik"&&<Btn small variant="ghost" style={{ background:"#e8a83022",color:"#e8a830" }} onClick={() => durumGuncelle(s.id,"hazirlaniyor")}>Hazirlaniyor</Btn>}
              {s.durum==="hazirlaniyor"&&<Btn small variant="ghost" style={{ background:"#7b68ee22",color:"#7b68ee" }} onClick={() => durumGuncelle(s.id,"yolda")}>Yola Cikti</Btn>}
              {s.durum==="yolda"&&<Btn small variant="success" onClick={() => durumGuncelle(s.id,"teslim")}>Teslim Edildi</Btn>}
              <Btn small variant="ghost" onClick={() => setDetayId(s.id===detayId?null:s.id)}>Detay</Btn>
            </div>
            {detayId===s.id&&(
              <div style={{ marginTop:10,borderTop:"1px solid "+C.border,paddingTop:10 }}>
                {(s.items||[]).map((item,i)=><div key={i} style={{ display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 0" }}><span>{item.ad} x{item.qty}</span><span style={{ color:C.accent }}>TL{(item.fiyat*item.qty).toFixed(0)}</span></div>)}
                {s.siparis_notu&&<div style={{ fontSize:12,color:C.muted,marginTop:6 }}>Not: {s.siparis_notu}</div>}
              </div>
            )}
          </Card>
        ))}
        {siparisler.length===0&&<div style={{ color:C.muted,textAlign:"center",padding:40 }}><div style={{ fontSize:40,marginBottom:8 }}>🛵</div>Aktif paket siparis yok</div>}
      </div>
      {yeniModal&&(
        <Modal title="Yeni Paket Siparis" onClose={() => { setYeniModal(false); setSepet([]); }}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <input placeholder="Musteri adi *" value={form.musteri} onChange={e=>setForm({...form,musteri:e.target.value})} />
            <input placeholder="Telefon" value={form.telefon} onChange={e=>setForm({...form,telefon:e.target.value})} />
            <input placeholder="Adres" value={form.adres} onChange={e=>setForm({...form,adres:e.target.value})} />
            <div style={{ fontSize:13,color:C.muted }}>Siparis kaynagi:</div>
            <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
              {kaynaklar.map(k=><button key={k} onClick={() => setForm({...form,kaynak:k})} style={{ background:form.kaynak===k?kaynakRenk[k]+"33":"transparent",color:form.kaynak===k?kaynakRenk[k]:C.muted,border:"1px solid "+(form.kaynak===k?kaynakRenk[k]:C.border),borderRadius:20,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:form.kaynak===k?700:400 }}>{k}</button>)}
            </div>
            <input placeholder="Siparis notu" value={form.not} onChange={e=>setForm({...form,not:e.target.value})} />
            <div style={{ fontSize:13,color:C.muted }}>Urunler:</div>
            <div style={{ display:"flex",gap:6,overflowX:"auto",paddingBottom:4 }}>
              {[{id:"tum",ad:"Tumu"},...kategoriler].map(k=><button key={k.id} onClick={() => setAktifKat(k.id)} style={{ background:aktifKat===k.id?C.accent:C.card,color:aktifKat===k.id?"#000":"#fff",border:"1px solid "+(aktifKat===k.id?C.accent:C.border),borderRadius:20,padding:"4px 12px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap" }}>{k.ad}</button>)}
            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,maxHeight:180,overflowY:"auto" }}>
              {menu.filter(m=>aktifKat==="tum"||m.kategori_id===aktifKat).map(m=><div key={m.id} onClick={() => sepetEkle(m)} style={{ background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"8px 10px",cursor:"pointer" }}><div style={{ fontWeight:600,fontSize:13 }}>{m.ad}</div><div style={{ color:accent||C.accent,fontSize:12 }}>TL{m.fiyat}</div></div>)}
            </div>
            {sepet.length>0&&<div style={{ background:C.surface,borderRadius:10,padding:10 }}>
              {sepet.map(item=><div key={item.menuId} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0" }}><span style={{ fontSize:13 }}>{item.ad}</span><div style={{ display:"flex",alignItems:"center",gap:6 }}><button onClick={() => sepetCikar(item.menuId)} style={{ background:C.border,border:"none",color:C.text,borderRadius:4,width:22,height:22,cursor:"pointer",fontSize:12 }}>-</button><span style={{ fontSize:13,fontWeight:600 }}>{item.qty}</span><button onClick={() => sepetEkle(menu.find(m=>m.id===item.menuId))} style={{ background:accent||C.accent,border:"none",color:"#000",borderRadius:4,width:22,height:22,cursor:"pointer",fontSize:12 }}>+</button></div></div>)}
              <div style={{ fontFamily:"Syne",fontSize:18,fontWeight:700,marginTop:8,color:accent||C.accent }}>TL{sipToplam.toFixed(0)}</div>
            </div>}
            <Btn onClick={siparisKaydet} disabled={!form.musteri||!sepet.length}>Siparis Olustur</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

const Personel = ({ isletmeId }) => {
  const [personeller, setPersoneller] = useState([]);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ ad:"", pozisyon:"", telefon:"", maas:"", baslangic:"" });
  const [detayId, setDetayId] = useState(null);
  const [vardiyaModal, setVardiyaModal] = useState(null);
  const [vardiyaForm, setVardiyaForm] = useState({ tarih:new Date().toISOString().split("T")[0], giris:"", cikis:"", vardiya_notu:"" });
  useEffect(() => { veriYukle(); }, []);
  const veriYukle = async () => { const {data}=await sb.from("personel").select("*, personel_vardiya(*)").eq("isletme_id",isletmeId).order("ad"); setPersoneller(data||[]); };
  const kaydet = async () => { if(!form.ad||!form.pozisyon)return; const {data}=await sb.from("personel").insert({...form,maas:+form.maas||0,isletme_id:isletmeId}).select("*, personel_vardiya(*)").single(); setPersoneller(p=>[...p,data]); setForm({ad:"",pozisyon:"",telefon:"",maas:"",baslangic:""}); setModal(false); };
  const sil = async (id) => { if(!window.confirm("Personeli silmek istediginize emin misiniz?"))return; await sb.from("personel").delete().eq("id",id); setPersoneller(p=>p.filter(x=>x.id!==id)); };
  const vardiyaEkle = async () => { if(!vardiyaForm.tarih||!vardiyaForm.giris)return; const {data}=await sb.from("personel_vardiya").insert({personel_id:vardiyaModal,...vardiyaForm}).select().single(); setPersoneller(p=>p.map(x=>x.id===vardiyaModal?{...x,personel_vardiya:[...(x.personel_vardiya||[]),data]}:x)); setVardiyaModal(null); setVardiyaForm({tarih:new Date().toISOString().split("T")[0],giris:"",cikis:"",vardiya_notu:""}); };
  const pozRenk = {garson:C.accent,asci:C.green,kasiyer:"#7b68ee",temizlik:C.muted,yonetici:C.red,diger:C.muted};
  return (
    <div className="fade-in" style={{ padding:16 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
        <span style={{ fontFamily:"Syne",fontSize:20,fontWeight:700 }}>Personel</span>
        <Btn small onClick={() => setModal(true)}>+ Personel Ekle</Btn>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14 }}>
        <Card><div style={{ fontSize:20,fontWeight:700,color:C.accent }}>{personeller.length}</div><div style={{ fontSize:11,color:C.muted }}>Toplam</div></Card>
        <Card><div style={{ fontSize:20,fontWeight:700,color:C.red }}>TL{personeller.reduce((t,p)=>t+(+p.maas||0),0).toLocaleString()}</div><div style={{ fontSize:11,color:C.muted }}>Toplam Maas</div></Card>
      </div>
      <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
        {personeller.map(p=>(
          <Card key={p.id}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
              <div>
                <div style={{ fontWeight:700,fontSize:15 }}>{p.ad}</div>
                <div style={{ display:"flex",gap:6,marginTop:4,flexWrap:"wrap" }}>
                  <Badge color={pozRenk[p.pozisyon]||C.muted}>{p.pozisyon}</Badge>
                  {p.telefon&&<span style={{ fontSize:12,color:C.muted }}>📞 {p.telefon}</span>}
                </div>
                {p.baslangic&&<div style={{ fontSize:12,color:C.muted,marginTop:4 }}>Baslangic: {new Date(p.baslangic).toLocaleDateString("tr-TR")}</div>}
              </div>
              <div style={{ textAlign:"right" }}><div style={{ fontWeight:700,color:C.green }}>TL{(+p.maas||0).toLocaleString()}</div><div style={{ fontSize:11,color:C.muted }}>aylik</div></div>
            </div>
            <div style={{ display:"flex",gap:6,marginTop:10,flexWrap:"wrap" }}>
              <Btn small variant="ghost" onClick={() => setVardiyaModal(p.id)}>+ Vardiya</Btn>
              <Btn small variant="ghost" onClick={() => setDetayId(p.id===detayId?null:p.id)}>Vardiyalar</Btn>
              <Btn small variant="danger" onClick={() => sil(p.id)}>Sil</Btn>
            </div>
            {detayId===p.id&&(
              <div style={{ marginTop:10,borderTop:"1px solid "+C.border,paddingTop:10 }}>
                {(p.personel_vardiya||[]).slice(-5).reverse().map((v,i)=>(
                  <div key={i} style={{ display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid "+C.border }}>
                    <span>{new Date(v.tarih).toLocaleDateString("tr-TR")}</span>
                    <span style={{ color:C.muted }}>{v.giris} - {v.cikis||"Devam"}</span>
                  </div>
                ))}
                {!(p.personel_vardiya||[]).length&&<div style={{ color:C.muted,fontSize:12 }}>Vardiya kaydi yok</div>}
              </div>
            )}
          </Card>
        ))}
        {personeller.length===0&&<div style={{ color:C.muted,textAlign:"center",padding:40 }}><div style={{ fontSize:40,marginBottom:8 }}>👥</div>Henuz personel eklenmedi</div>}
      </div>
      {modal&&(
        <Modal title="Yeni Personel" onClose={() => setModal(false)}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <input placeholder="Ad Soyad *" value={form.ad} onChange={e=>setForm({...form,ad:e.target.value})} />
            <select value={form.pozisyon} onChange={e=>setForm({...form,pozisyon:e.target.value})}>
              <option value="">Pozisyon sec *</option>
              {["garson","asci","kasiyer","temizlik","yonetici","diger"].map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
            </select>
            <input placeholder="Telefon" value={form.telefon} onChange={e=>setForm({...form,telefon:e.target.value})} />
            <input type="number" placeholder="Aylik maas (TL)" value={form.maas} onChange={e=>setForm({...form,maas:e.target.value})} />
            <input type="date" value={form.baslangic} onChange={e=>setForm({...form,baslangic:e.target.value})} />
            <Btn onClick={kaydet} disabled={!form.ad||!form.pozisyon}>Kaydet</Btn>
          </div>
        </Modal>
      )}
      {vardiyaModal&&(
        <Modal title="Vardiya Ekle" onClose={() => setVardiyaModal(null)}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <input type="date" value={vardiyaForm.tarih} onChange={e=>setVardiyaForm({...vardiyaForm,tarih:e.target.value})} />
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8 }}>
              <input type="time" placeholder="Giris" value={vardiyaForm.giris} onChange={e=>setVardiyaForm({...vardiyaForm,giris:e.target.value})} />
              <input type="time" placeholder="Cikis" value={vardiyaForm.cikis} onChange={e=>setVardiyaForm({...vardiyaForm,cikis:e.target.value})} />
            </div>
            <input placeholder="Not" value={vardiyaForm.vardiya_notu} onChange={e=>setVardiyaForm({...vardiyaForm,vardiya_notu:e.target.value})} />
            <Btn onClick={vardiyaEkle} disabled={!vardiyaForm.giris}>Kaydet</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

function App() {
  const [kullanici, setKullanici] = useState(null);
  const [yukleniyor, setYukleniyor] = useState(true);
  const [sayfa, setSayfa] = useState("dashboard");
  const [malzemeler, setMalzemeler] = useState([]);
  const [menu, setMenu] = useState([]);
  const [satislar, setSatislar] = useState([]);
  const [kategoriler, setKategoriler] = useState([]);
  const [masraflar, setMasraflar] = useState([]);
  const [tema, setTema] = useState(function() { return localStorage.getItem("tema") || "dark"; });
  const [cevrimici, setCevrimici] = useState(navigator.onLine);
  const [navAcik, setNavAcik] = useState(false);

  useEffect(() => {
    if (tema==="light") { document.body.style.background="#f5f5f0"; document.body.style.color="#1a1814"; }
    else { document.body.style.background="#0f0e0c"; document.body.style.color="#f0ebe3"; }
    localStorage.setItem("tema", tema);
  }, [tema]);

  useEffect(() => {
    const online=()=>setCevrimici(true); const offline=()=>setCevrimici(false);
    window.addEventListener("online",online); window.addEventListener("offline",offline);
    return function(){window.removeEventListener("online",online);window.removeEventListener("offline",offline);};
  }, []);

  useEffect(() => {
    sb.auth.getSession().then(async function(result) {
      const session=result.data.session;
      if (session) {
        const {data}=await sb.from("kullanicilar").select("*, isletmeler(*)").eq("id",session.user.id).single();
        if (data) { setKullanici(data); if(navigator.onLine){await veriYukle(data.isletme_id);}else{const m=localCache.get("malzemeler_"+data.isletme_id);const mn=localCache.get("menu_"+data.isletme_id);const s=localCache.get("satislar_"+data.isletme_id);if(m)setMalzemeler(m);if(mn)setMenu(mn);if(s)setSatislar(s);} }
      }
      setYukleniyor(false);
    });
  }, []);

  useEffect(function() { if(cevrimici&&kullanici)veriYukle(kullanici.isletme_id); }, [cevrimici]);

  const veriYukle = async (isletmeId) => {
    try {
      const [r1,r2,r3,r4,r5]=await Promise.all([
        sb.from("malzemeler").select("*").eq("isletme_id",isletmeId),
        sb.from("menu").select("*").eq("isletme_id",isletmeId),
        sb.from("satislar").select("*").eq("isletme_id",isletmeId).order("tarih",{ascending:false}).limit(200),
        sb.from("kategoriler").select("*").eq("isletme_id",isletmeId).order("sira"),
        sb.from("masraflar").select("*").eq("isletme_id",isletmeId).order("tarih",{ascending:false}).limit(200),
      ]);
      setMalzemeler(r1.data||[]); setMenu(r2.data||[]); setSatislar(r3.data||[]); setKategoriler(r4.data||[]); setMasraflar(r5.data||[]);
      localCache.set("malzemeler_"+isletmeId,r1.data||[]); localCache.set("menu_"+isletmeId,r2.data||[]); localCache.set("satislar_"+isletmeId,r3.data||[]);
    } catch(e) {
      const m=localCache.get("malzemeler_"+isletmeId); const mn=localCache.get("menu_"+isletmeId); const s=localCache.get("satislar_"+isletmeId);
      if(m)setMalzemeler(m); if(mn)setMenu(mn); if(s)setSatislar(s);
    }
  };

  const handleGiris = async (k) => { setKullanici(k); await veriYukle(k.isletme_id); };

  if (yukleniyor) return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg }}><Spinner /></div>;
  if (!kullanici) return <GirisEkrani onGiris={handleGiris} />;

  const isletme=kullanici.isletmeler;
  const accent=isletme?(isletme.renk||C.accent):C.accent;
  const dusukStok=malzemeler.filter(m=>m.stok<=m.min_stok).length;
  const erisim=erisimListesi(kullanici);

  const tumNav=[
    {id:"dashboard",icon:"📊",label:"Ozet"},
    {id:"masalar",icon:"🪑",label:"Masalar"},
    {id:"malzemeler",icon:"📦",label:"Stok",badge:dusukStok},
    {id:"menu",icon:"🍔",label:"Menu"},
    {id:"mutfak",icon:"👨‍🍳",label:"Mutfak"},
    {id:"paket",icon:"🛵",label:"Paket"},
    {id:"personel",icon:"👥",label:"Personel"},
    {id:"masraflar",icon:"💸",label:"Masraf"},
    {id:"qrmenu",icon:"📱",label:"QR Menu"},
    {id:"raporlar",icon:"📈",label:"Raporlar"},
    {id:"ayarlar",icon:"⚙️",label:"Ayarlar"},
  ];
  const nav=tumNav.filter(n=>erisim.includes(n.id));
  const bgRenk=tema==="light"?"#f5f5f0":C.bg;
  const surfaceRenk=tema==="light"?"#ffffff":C.surface;
  const borderRenk=tema==="light"?"#e0ddd8":C.border;
  const textRenk=tema==="light"?"#1a1814":C.text;
  const aktifNavLabel=nav.find(n=>n.id===sayfa)?.label||"";

  return (
    <div style={{ maxWidth:540, margin:"0 auto", minHeight:"100vh", background:bgRenk, position:"relative" }}>
      <div style={{ position:"sticky",top:0,zIndex:50,background:surfaceRenk,borderBottom:"1px solid "+borderRenk,display:"flex",alignItems:"center",padding:"12px 16px",gap:12 }}>
        <button onClick={() => setNavAcik(true)} style={{ background:"none",border:"none",display:"flex",flexDirection:"column",gap:5,padding:4,cursor:"pointer",position:"relative" }}>
          <span style={{ display:"block",width:22,height:2,background:accent,borderRadius:2 }} />
          <span style={{ display:"block",width:16,height:2,background:accent,borderRadius:2 }} />
          <span style={{ display:"block",width:22,height:2,background:accent,borderRadius:2 }} />
          {dusukStok>0&&<span style={{ position:"absolute",top:-2,right:-6,background:C.red,color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700 }}>{dusukStok}</span>}
        </button>
        <div style={{ flex:1 }}><div style={{ fontFamily:"Syne",fontSize:16,fontWeight:700,color:accent }}>{aktifNavLabel}</div></div>
        {isletme&&isletme.logo_url&&<img src={isletme.logo_url} style={{ width:32,height:32,borderRadius:8,objectFit:"cover" }} />}
      </div>
      {!cevrimici&&<div style={{ background:"#e8a83022",borderBottom:"1px solid #e8a83044",color:"#e8a830",padding:"8px 16px",fontSize:13,textAlign:"center" }}>Cevrimdisi - son kaydedilen veriler gosteriliyor</div>}
      <div style={{ paddingBottom:24 }}>
        {sayfa==="dashboard"  &&erisim.includes("dashboard")  &&<Dashboard isletme={isletme} malzemeler={malzemeler} menu={menu} satislar={satislar} masraflar={masraflar} />}
        {sayfa==="masalar"    &&erisim.includes("masalar")    &&<Masalar isletmeId={kullanici.isletme_id} kullaniciId={kullanici.id} menu={menu} malzemeler={malzemeler} setMalzemeler={setMalzemeler} setSatislar={setSatislar} accent={accent} kategoriler={kategoriler} />}
        {sayfa==="malzemeler" &&erisim.includes("malzemeler") &&<Malzemeler isletmeId={kullanici.isletme_id} malzemeler={malzemeler} setMalzemeler={setMalzemeler} cevrimici={cevrimici} />}
        {sayfa==="menu"       &&erisim.includes("menu")       &&<MenuSayfasi isletmeId={kullanici.isletme_id} menu={menu} setMenu={setMenu} malzemeler={malzemeler} kategoriler={kategoriler} setKategoriler={setKategoriler} />}
        {sayfa==="mutfak"     &&erisim.includes("mutfak")     &&<MutfakEkrani isletmeId={kullanici.isletme_id} />}
        {sayfa==="paket"      &&erisim.includes("paket")      &&<PaketSiparis isletmeId={kullanici.isletme_id} kullaniciId={kullanici.id} menu={menu} setSatislar={setSatislar} accent={accent} kategoriler={kategoriler} />}
        {sayfa==="personel"   &&erisim.includes("personel")   &&<Personel isletmeId={kullanici.isletme_id} />}
        {sayfa==="masraflar"  &&erisim.includes("masraflar")  &&<Masraflar isletmeId={kullanici.isletme_id} masraflar={masraflar} setMasraflar={setMasraflar} />}
        {sayfa==="qrmenu"     &&erisim.includes("qrmenu")     &&<QRMenu isletme={isletme} menu={menu} kategoriler={kategoriler} />}
        {sayfa==="raporlar"   &&erisim.includes("raporlar")   &&<Raporlar satislar={satislar} menu={menu} malzemeler={malzemeler} isletme={isletme} />}
        {sayfa==="ayarlar"    &&erisim.includes("ayarlar")    &&<Ayarlar kullanici={kullanici} tema={tema} setTema={setTema} isletmeId={kullanici.isletme_id} setSatislar={setSatislar} />}
      </div>
      {navAcik&&<div onClick={() => setNavAcik(false)} style={{ position:"fixed",inset:0,background:"#000000aa",zIndex:90 }} />}
      <div style={{ position:"fixed",top:0,left:0,height:"100vh",width:260,background:surfaceRenk,borderRight:"1px solid "+borderRenk,zIndex:100,transform:navAcik?"translateX(0)":"translateX(-100%)",transition:"transform 0.28s cubic-bezier(.4,0,.2,1)",display:"flex",flexDirection:"column",overflowY:"auto" }}>
        <div style={{ padding:"20px 20px 16px",borderBottom:"1px solid "+borderRenk,display:"flex",alignItems:"center",justifyContent:"space-between" }}>
          <div>
            <div style={{ fontFamily:"Syne",fontSize:20,fontWeight:800,color:accent }}>🍔 BurgerStock</div>
            <div style={{ fontSize:12,color:C.muted,marginTop:2 }}>{kullanici.email}</div>
          </div>
          <button onClick={() => setNavAcik(false)} style={{ background:"none",border:"none",color:C.muted,fontSize:20,padding:4,lineHeight:1,cursor:"pointer" }}>X</button>
        </div>
        <div style={{ flex:1,padding:"12px 0" }}>
          {nav.map(n=>{
            const aktif=sayfa===n.id;
            return (
              <button key={n.id} onClick={() => { setSayfa(n.id); setNavAcik(false); }}
                style={{ width:"100%",background:aktif?accent+"18":"none",border:"none",borderLeft:aktif?"3px solid "+accent:"3px solid transparent",display:"flex",alignItems:"center",gap:14,padding:"13px 20px",cursor:"pointer",position:"relative",textAlign:"left" }}>
                <span style={{ fontSize:20,lineHeight:1 }}>{n.icon}</span>
                <span style={{ fontSize:15,fontWeight:aktif?700:400,color:aktif?accent:textRenk }}>{n.label}</span>
                {n.badge>0&&<span style={{ marginLeft:"auto",background:C.red,color:"#fff",borderRadius:10,padding:"2px 7px",fontSize:11,fontWeight:700 }}>{n.badge}</span>}
              </button>
            );
          })}
        </div>
        <div style={{ padding:"16px 20px",borderTop:"1px solid "+borderRenk }}>
          <div style={{ fontSize:12,color:C.muted,marginBottom:4 }}>{rolLabel(kullanici.rol,kullanici.rol_ad)}</div>
          <button onClick={async()=>{await sb.auth.signOut();window.location.reload();}} style={{ background:C.red+"22",color:C.red,border:"1px solid "+C.red+"44",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",fontWeight:500 }}>Cikis Yap</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
