<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BurgerStock</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0e0c; color: #f0ebe3; font-family: 'DM Sans', sans-serif; }
    input, select { outline: none; background: #1a1814; color: #f0ebe3; border: 1px solid #2e2b26; border-radius: 10px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%; transition: border 0.2s; }
    input:focus, select:focus { border-color: var(--accent, #f5a623); }
    input::placeholder { color: #8a847a; }
    button { cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; transition: all 0.18s; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    .badge-pulse { animation: pulse 2s infinite; }
    .spin { animation: spin 1s linear infinite; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2e2b26; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = 'https://kdqwmkbtflperskelnok.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nSE0pMSTyyToqoVmZqKseQ_3BIm-g6w';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const C = {
  bg: "#0f0e0c", surface: "#1a1814", card: "#201e1a", border: "#2e2b26",
  accent: "#f5a623", red: "#e05252", green: "#52c97a", text: "#f0ebe3", muted: "#8a847a",
};

const Card = ({ children, style }) => (
  <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 16, padding: 16, ...style }}>{children}</div>
);

const Btn = ({ children, onClick, variant = "primary", style, small, disabled }) => {
  const styles = {
    primary: { background: C.accent, color: "#000", padding: small ? "8px 14px" : "11px 20px" },
    ghost: { background: "transparent", color: C.text, border: "1px solid " + C.border, padding: small ? "8px 14px" : "11px 20px" },
    danger: { background: C.red + "22", color: C.red, border: "1px solid " + C.red + "44", padding: small ? "8px 14px" : "11px 20px" },
    success: { background: C.green + "22", color: C.green, border: "1px solid " + C.green + "44", padding: small ? "8px 14px" : "11px 20px" },
  };
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ ...styles[variant], borderRadius: 10, fontWeight: 500, opacity: disabled ? 0.5 : 1, ...style }}>
      {children}
    </button>
  );
};

const Badge = ({ children, color }) => (
  <span style={{ background: color + "22", color, borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 500 }}>{children}</span>
);

const Modal = ({ title, onClose, children }) => (
  <div style={{ position: "fixed", inset: 0, background: "#000a", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
    onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="fade-in" style={{ background: C.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 540, maxHeight: "90vh", overflow: "auto", padding: 24, border: "1px solid " + C.border }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <span style={{ fontFamily: "Syne", fontSize: 18, fontWeight: 700 }}>{title}</span>
        <Btn variant="ghost" small onClick={onClose}>X</Btn>
      </div>
      {children}
    </div>
  </div>
);

const Spinner = () => (
  <div style={{ display: "flex", justifyContent: "center", padding: 40 }}>
    <div className="spin" style={{ width: 32, height: 32, border: "3px solid " + C.border, borderTopColor: C.accent, borderRadius: "50%" }} />
  </div>
);

const localCache = {
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} },
  get: (key) => { try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; } },
};

const TUM_SAYFALAR = [
  { id: "dashboard", label: "Ozet" },
  { id: "masalar", label: "Masalar" },
  { id: "malzemeler", label: "Stok" },
  { id: "menu", label: "Menu" },
  { id: "mutfak", label: "Mutfak" },
  { id: "paket", label: "Paket" },
  { id: "personel", label: "Personel" },
  { id: "masraflar", label: "Masraflar" },
  { id: "qrmenu", label: "QR Menu" },
  { id: "raporlar", label: "Raporlar" },
];

const ROL_ERISIM = {
  mudur: ["dashboard","masalar","malzemeler","menu","mutfak","paket","personel","masraflar","qrmenu","raporlar","ayarlar"],
  kasiyer: ["dashboard","masalar","malzemeler","ayarlar"],
  garson: ["dashboard","masalar","ayarlar"],
  mutfak: ["mutfak","ayarlar"],
  kasiyer_yrd: ["dashboard","masalar","ayarlar"],
};

const HAZIR_ROLLER = [
  { deger: "mudur", label: "Mudur", aciklama: "Tum sayfalara erisim", renk: "#f5a623" },
  { deger: "kasiyer", label: "Kasiyer", aciklama: "Ozet, Masalar, Stok", renk: "#52c97a" },
  { deger: "garson", label: "Garson", aciklama: "Ozet, Masalar", renk: "#7b68ee" },
  { deger: "mutfak", label: "Mutfak Personeli", aciklama: "Sadece Mutfak ekrani", renk: "#e8a830" },
  { deger: "kasiyer_yrd", label: "Kasiyer Yrd.", aciklama: "Ozet, Masalar", renk: "#30c8e8" },
  { deger: "ozel", label: "Ozel Rol", aciklama: "Erisimi kendin belirle", renk: "#8a847a" },
];

const rolLabel = (rol, rol_ad) => {
  if (rol === "ozel" && rol_ad) return rol_ad;
  const map = { mudur:"Mudur", kasiyer:"Kasiyer", garson:"Garson", mutfak:"Mutfak", kasiyer_yrd:"Kasiyer Yrd.", ozel:"Ozel Rol" };
  return map[rol] || rol;
};

const rolRenk = (rol) => {
  const map = { mudur:"#f5a623", kasiyer:"#52c97a", garson:"#7b68ee", mutfak:"#e8a830", kasiyer_yrd:"#30c8e8", ozel:"#8a847a" };
  return map[rol] || "#8a847a";
};

const erisimListesi = (kullanici) => {
  if (!kullanici) return [];
  if (kullanici.rol === "ozel" && kullanici.erisim) {
    const liste = Array.isArray(kullanici.erisim) ? kullanici.erisim : [];
    return [...liste, "ayarlar"];
  }
  return ROL_ERISIM[kullanici.rol] || ROL_ERISIM["kasiyer"];
};

const GirisEkrani = ({ onGiris }) => {
  const [email, setEmail] = useState("");
  const [sifre, setSifre] = useState("");
  const [hata, setHata] = useState("");
  const [yukleniyor, setYukleniyor] = useState(false);
  const [kayitModu, setKayitModu] = useState(false);
  const [isletmeAd, setIsletmeAd] = useState("");

  const girisYap = async () => {
    setHata(""); setYukleniyor(true);
    try {
      if (kayitModu) {
        const { data: authData, error: authErr } = await sb.auth.signUp({ email, password: sifre });
        if (authErr) throw authErr;
        const { data: isletme, error: isletmeErr } = await sb.from("isletmeler").insert({ ad: isletmeAd, renk: "#f5a623" }).select().single();
        if (isletmeErr) throw isletmeErr;
        await sb.from("kullanicilar").insert({ id: authData.user.id, isletme_id: isletme.id, email, rol: "mudur" });
        setHata("Kayit basarili! Giris yapabilirsin.");
        setKayitModu(false);
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: sifre });
        if (error) throw error;
        const { data: kullanici } = await sb.from("kullanicilar").select("*, isletmeler(*)").eq("id", data.user.id).single();
        onGiris(kullanici);
      }
    } catch (e) {
      setHata(e.message === "Invalid login credentials" ? "E-posta veya sifre hatali." : e.message);
    }
    setYukleniyor(false);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: C.bg }}>
      <div className="fade-in" style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>🍔</div>
          <div style={{ fontFamily: "Syne", fontSize: 28, fontWeight: 800, color: C.accent }}>BurgerStock</div>
          <div style={{ color: C.muted, fontSize: 14, marginTop: 4 }}>Restoran ve Kafe Stok Yonetimi</div>
        </div>
        <Card>
          <div style={{ fontFamily: "Syne", fontSize: 18, fontWeight: 700, marginBottom: 20 }}>
            {kayitModu ? "Hesap Olustur" : "Giris Yap"}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {kayitModu && <input placeholder="Isletme adi" value={isletmeAd} onChange={e => setIsletmeAd(e.target.value)} />}
            <input type="email" placeholder="E-posta" value={email} onChange={e => setEmail(e.target.value)} />
            <input type="password" placeholder="Sifre" value={sifre} onChange={e => setSifre(e.target.value)} onKeyDown={e => e.key === "Enter" && girisYap()} />
            {hata && <div style={{ color: C.red, fontSize: 13 }}>{hata}</div>}
            <Btn onClick={girisYap} disabled={yukleniyor}>{yukleniyor ? "Lutfen bekle..." : kayitModu ? "Hesap Olustur" : "Giris Yap"}</Btn>
            <div style={{ textAlign: "center", fontSize: 13, color: C.muted }}>
              {kayitModu ? "Hesabin var mi?" : "Hesabin yok mu?"}{" "}
              <span onClick={() => { setKayitModu(!kayitModu); setHata(""); }} style={{ color: C.accent, cursor: "pointer", fontWeight: 600 }}>
                {kayitModu ? "Giris yap" : "Kayit ol"}
              </span>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
};

const Ayarlar = ({ kullanici, tema, setTema, isletmeId, setSatislar }) => {
  const [isletme, setIsletme] = useState(kullanici.isletmeler);
  const [kayit, setKayit] = useState(false);
  const [yeniK, setYeniK] = useState({ email: "", sifre: "", rol: "kasiyer", ozelAd: "", erisim: [] });
  const [mesaj, setMesaj] = useState("");
  const [logoYukleniyor, setLogoYukleniyor] = useState(false);
  const [kullanicilar, setKullanicilar] = useState([]);
  const [kullanicilariGoster, setKullanicilariGoster] = useState(false);
  const fileRef = useRef();

  useEffect(() => { if (kullanici.rol === "mudur") kullanicilariYukle(); }, []);

  const kullanicilariYukle = async () => {
    const { data } = await sb.from("kullanicilar").select("*").eq("isletme_id", isletme.id);
    setKullanicilar(data || []);
  };

  const kullaniciSil = async (hedef) => {
    if (hedef.id === kullanici.id) { setMesaj("Kendinizi silemezsiniz."); setTimeout(() => setMesaj(""), 3000); return; }
    if (!window.confirm(hedef.email + " adli kullanicinin silinmesini onayliyor musunuz?")) return;
    try {
      await sb.from("kullanicilar").delete().eq("id", hedef.id);
      setKullanicilar(k => k.filter(x => x.id !== hedef.id));
      setMesaj("Kullanici silindi!"); setTimeout(() => setMesaj(""), 2000);
    } catch (e) { setMesaj("Hata: " + e.message); }
  };

  const isletmeGuncelle = async () => {
    await sb.from("isletmeler").update({ ad: isletme.ad, renk: isletme.renk }).eq("id", isletme.id);
    setMesaj("Kaydedildi!"); setTimeout(() => setMesaj(""), 2000);
  };

  const logoYukle = async (e) => {
    const dosya = e.target.files[0];
    if (!dosya) return;
    setLogoYukleniyor(true);
    const dosyaAdi = isletme.id + "-logo." + dosya.name.split('.').pop();
    const { error: upErr } = await sb.storage.from("logolar").upload(dosyaAdi, dosya, { upsert: true });
    if (upErr) { setMesaj("Logo yuklenemedi: " + upErr.message); setLogoYukleniyor(false); return; }
    const { data: urlData } = sb.storage.from("logolar").getPublicUrl(dosyaAdi);
    await sb.from("isletmeler").update({ logo_url: urlData.publicUrl }).eq("id", isletme.id);
    setIsletme({ ...isletme, logo_url: urlData.publicUrl });
    setMesaj("Logo yuklendi!"); setLogoYukleniyor(false); setTimeout(() => setMesaj(""), 2000);
  };

  const kasiyerEkle = async () => {
    if (!yeniK.email || !yeniK.sifre) return;
    if (yeniK.rol === "ozel" && !yeniK.erisim.length) { setMesaj("Ozel rol icin en az 1 sayfa secin."); return; }
    try {
      const { data, error } = await sb.auth.signUp({ email: yeniK.email, password: yeniK.sifre });
      if (error) throw error;
      await sb.from("kullanicilar").insert({
        id: data.user.id, isletme_id: isletme.id, email: yeniK.email, rol: yeniK.rol,
        rol_ad: yeniK.rol === "ozel" ? (yeniK.ozelAd || "Ozel Rol") : null,
        erisim: yeniK.rol === "ozel" ? yeniK.erisim : (ROL_ERISIM[yeniK.rol] || ROL_ERISIM["kasiyer"]),
      });
      setMesaj("Kullanici eklendi!"); setYeniK({ email: "", sifre: "", rol: "kasiyer", ozelAd: "", erisim: [] }); setKayit(false);
      await kullanicilariYukle(); setTimeout(() => setMesaj(""), 2000);
    } catch (e) { setMesaj("Hata: " + e.message); }
  };

  const cikisYap = async () => { await sb.auth.signOut(); window.location.reload(); };

  return (
    <div className="fade-in" style={{ padding: 16 }}>
      <div style={{ fontFamily: "Syne", fontSize: 20, fontWeight: 700, marginBottom: 16 }}>Ayarlar</div>
      {mesaj && <div style={{ color: mesaj.startsWith("Hata") || mesaj.startsWith("Kendinizi") ? C.red : C.green, marginBottom: 12, fontSize: 14 }}>{mesaj}</div>}

      <Card style={{ marginBottom: 12 }}>
        <div style={{ fontWeight: 600, marginBottom: 12, color: C.muted, fontSize: 13 }}>GORUNUM</div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ fontWeight:600, fontSize:14 }}>{tema === "dark" ? "Karanlik Tema" : "Acik Tema"}</div>
          <div onClick={() => setTema(tema === "dark" ? "light" : "dark")}
            style={{ width:48, height:26, borderRadius:13, background: tema==="dark" ? C.accent : C.border, cursor:"pointer", position:"relative", transition:"all 0.2s" }}>
            <div style={{ position:"absolute", top:3, left: tema==="dark" ? 24:3, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"all 0.2s" }} />
          </div>
        </div>
      </Card>

      <Card style={{ marginBottom: 12 }}>
        <div style={{ fontWeight: 600, marginBottom: 12, color: C.muted, fontSize: 13 }}>ISLETME BILGILERI</div>
        <div style={{ marginBottom: 16, display: "flex", alignItems: "center", gap: 14 }}>
          <div onClick={() => fileRef.current.click()}
            style={{ width: 72, height: 72, borderRadius: 14, border: "2px dashed " + C.border, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", overflow: "hidden", background: C.surface }}>
            {isletme.logo_url ? <img src={isletme.logo_url} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 28 }}>📷</span>}
          </div>
          <div>
            <Btn small variant="ghost" onClick={() => fileRef.current.click()} disabled={logoYukleniyor}>{logoYukleniyor ? "Yukleniyor..." : "Logo Sec"}</Btn>
            <input ref={fileRef} type="file" accept="image/*" onChange={logoYukle} style={{ display: "none" }} />
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <input placeholder="Isletme adi" value={isletme.ad} onChange={e => setIsletme({...isletme, ad: e.target.value})} />
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <input type="color" value={isletme.renk || "#f5a623"} onChange={e => setIsletme({...isletme, renk: e.target.value})}
              style={{ width: 48, height: 40, padding: 4, borderRadius: 8, cursor: "pointer" }} />
            <div style={{ width: 32, height: 32, borderRadius: 8, background: isletme.renk || "#f5a623" }} />
          </div>
          <Btn onClick={isletmeGuncelle}>Kaydet</Btn>
        </div>
      </Card>

      {kullanici.rol === "mudur" && (
        <Card style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontWeight: 600, color: C.muted, fontSize: 13 }}>KULLANICI YONETIMI</div>
            <div style={{ display:"flex", gap:8 }}>
              <Btn small variant="ghost" onClick={() => { setKullanicilariGoster(!kullanicilariGoster); setKayit(false); }}>{kullanicilariGoster ? "Gizle" : "Listele"}</Btn>
              <Btn small onClick={() => { setKayit(!kayit); setKullanicilariGoster(false); }}>{kayit ? "Iptal" : "+ Ekle"}</Btn>
            </div>
          </div>
          {kullanicilariGoster && (
            <div style={{ marginBottom: kayit ? 12 : 0 }}>
              {kullanicilar.map(k => (
                <div key={k.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid " + C.border }}>
                  <div>
                    <div style={{ fontSize:14, fontWeight:600 }}>{k.email}</div>
                    <Badge color={rolRenk(k.rol)}>{rolLabel(k.rol, k.rol_ad)}</Badge>
                  </div>
                  {k.id !== kullanici.id ? <Btn small variant="danger" onClick={() => kullaniciSil(k)}>Sil</Btn> : <span style={{ fontSize:12, color:C.muted, fontStyle:"italic" }}>Sen</span>}
                </div>
              ))}
              {kullanicilar.length === 0 && <div style={{ color:C.muted, textAlign:"center", padding:16, fontSize:13 }}>Kullanici bulunamadi</div>}
            </div>
          )}
          {kayit && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <input placeholder="E-posta" value={yeniK.email} onChange={e => setYeniK({...yeniK, email: e.target.value})} />
              <input type="password" placeholder="Sifre" value={yeniK.sifre} onChange={e => setYeniK({...yeniK, sifre: e.target.value})} />
              <div style={{ fontSize: 13, color: C.muted }}>Rol sec:</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {HAZIR_ROLLER.map(r => (
                  <div key={r.deger} onClick={() => setYeniK({...yeniK, rol: r.deger, erisim: ROL_ERISIM[r.deger] || []})}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px", background: yeniK.rol===r.deger ? r.renk+"22" : C.surface, border:"1px solid "+(yeniK.rol===r.deger?r.renk:C.border), borderRadius:10, cursor:"pointer" }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:r.renk, flexShrink:0 }} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:600, fontSize:13, color: yeniK.rol===r.deger?r.renk:C.text }}>{r.label}</div>
                      <div style={{ fontSize:11, color:C.muted }}>{r.aciklama}</div>
                    </div>
                    {yeniK.rol===r.deger && <span style={{ color:r.renk, fontSize:14 }}>v</span>}
                  </div>
                ))}
              </div>
              {yeniK.rol === "ozel" && <input placeholder="Rol adi (Barista, Sef...)" value={yeniK.ozelAd} onChange={e => setYeniK({...yeniK, ozelAd: e.target.value})} />}
              {yeniK.rol === "ozel" && (
                <div>
                  <div style={{ fontSize:13, color:C.muted, marginBottom:8 }}>Hangi sayfalara erisebilsin?</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                    {TUM_SAYFALAR.map(s => {
                      const secili = yeniK.erisim.includes(s.id);
                      return (
                        <div key={s.id} onClick={() => { const yeni = secili ? yeniK.erisim.filter(x=>x!==s.id) : [...yeniK.erisim,s.id]; setYeniK({...yeniK,erisim:yeni}); }}
                          style={{ padding:"6px 13px", borderRadius:20, fontSize:12, cursor:"pointer", background: secili?C.accent+"22":"transparent", color: secili?C.accent:C.muted, border:"1px solid "+(secili?C.accent:C.border), fontWeight: secili?600:400 }}>
                          {s.label}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              <Btn onClick={kasiyerEkle} disabled={!yeniK.email||!yeniK.sifre||(yeniK.rol==="ozel"&&!yeniK.erisim.length)}>Kullanici Ekle</Btn>
            </div>
          )}
        </Card>
      )}

      {kullanici.rol === "mudur" && (
        <Card style={{ marginBottom: 12, border: "1px solid " + C.red + "44" }}>
          <div style={{ fontWeight: 600, color: C.muted, fontSize: 13, marginBottom: 8 }}>VERI YONETIMI</div>
          <div style={{ fontSize: 13, color: C.muted, marginBottom: 12 }}>Tum satis kayitlarini siler. Geri alinamaz!</div>
          <Btn variant="danger" onClick={async () => {
            if (!window.confirm("TUM satis kayitlarini silmek istediginize emin misiniz?")) return;
            await sb.from("satislar").delete().eq("isletme_id", isletmeId);
            setSatislar([]);
            setMesaj("Satis kayitlari silindi!"); setTimeout(() => setMesaj(""), 3000);
          }}>Tum Satis Kayitlarini Sifirla</Btn>
        </Card>
      )}

      <Card>
        <div style={{ fontSize: 14, color: C.muted, marginBottom: 4 }}>Giris yapan</div>
        <div style={{ fontWeight: 600, marginBottom: 6 }}>{kullanici.email}</div>
        <Badge color={rolRenk(kullanici.rol)}>{rolLabel(kullanici.rol, kullanici.rol_ad)}</Badge>
        <div style={{ marginTop: 16 }}>
          <Btn variant="danger" onClick={cikisYap}>Cikis Yap</Btn>
        </div>
      </Card>
    </div>
  );
};

const Dashboard = ({ isletme, malzemeler, menu, satislar, masraflar }) => {
  const accent = isletme ? (isletme.renk || C.accent) : C.accent;
  const dusukStok = malzemeler.filter(m => m.stok <= m.min_stok);
  const simdi = new Date();
  const bugunBaslangic = new Date(simdi); bugunBaslangic.setHours(0,0,0,0);
  const haftaBaslangic = new Date(simdi);
  const hg = haftaBaslangic.getDay();
  haftaBaslangic.setDate(haftaBaslangic.getDate() + (hg===0?-6:1-hg)); haftaBaslangic.setHours(0,0,0,0);
  const ayBaslangic = new Date(simdi.getFullYear(), simdi.getMonth(), 1);
  const satirSatislar = satislar.filter(s => !s.tip || s.tip !== "zayi");
  const bugunSatis = satirSatislar.filter(s => new Date(s.tarih) >= bugunBaslangic);
  const haftaSatis = satirSatislar.filter(s => new Date(s.tarih) >= haftaBaslangic);
  const aySatis = satirSatislar.filter(s => new Date(s.tarih) >= ayBaslangic);
  const bugunCiro = bugunSatis.reduce((t,s) => t+s.toplam, 0);
  const haftaCiro = haftaSatis.reduce((t,s) => t+s.toplam, 0);
  const ayCiro = aySatis.reduce((t,s) => t+s.toplam, 0);
  const bugunMasraf = (masraflar||[]).filter(m => new Date(m.tarih) >= bugunBaslangic).reduce((t,m) => t+(+m.tutar||0), 0);
  const haftaMasraf = (masraflar||[]).filter(m => new Date(m.tarih) >= haftaBaslangic).reduce((t,m) => t+(+m.tutar||0), 0);
  const ayMasraf = (masraflar||[]).filter(m => new Date(m.tarih) >= ayBaslangic).reduce((t,m) => t+(+m.tutar||0), 0);
  const [donem, setDonem] = useState("bugun");
  const ciro = donem==="bugun"?bugunCiro:donem==="hafta"?haftaCiro:ayCiro;
  const masraf = donem==="bugun"?bugunMasraf:donem==="hafta"?haftaMasraf:ayMasraf;
  const satisSayisi = donem==="bugun"?bugunSatis.length:donem==="hafta"?haftaSatis.length:aySatis.length;
  const donemLabel = donem==="bugun"?"Bugun":donem==="hafta"?"Bu Hafta":"Bu Ay";
  return (
    <div className="fade-in" style={{ padding:16, display:"flex", flexDirection:"column", gap:14 }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        {isletme && isletme.logo_url && <img src={isletme.logo_url} style={{ width:44, height:44, borderRadius:10, objectFit:"cover", border:"1px solid "+C.border }} />}
        <div style={{ fontFamily:"Syne", fontSize:22, fontWeight:800, color:accent }}>🍔 {isletme?isletme.ad:"BurgerStock"}</div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        {[["bugun","Bugun"],["hafta","Bu Hafta"],["ay","Bu Ay"]].map(([k,l]) => (
          <button key={k} onClick={() => setDonem(k)}
            style={{ flex:1, background:donem===k?accent:C.card, color:donem===k?"#000":"#fff", border:"1px solid "+(donem===k?accent:C.border), borderRadius:20, padding:"7px 0", fontSize:12, cursor:"pointer", fontWeight:donem===k?700:400 }}>{l}</button>
        ))}
      </div>
      <Card style={{ background:accent+"15", border:"1px solid "+accent+"44" }}>
        <div style={{ fontSize:13, color:C.muted, marginBottom:4 }}>{donemLabel} Ciro</div>
        <div style={{ fontFamily:"Syne", fontSize:34, fontWeight:800, color:accent }}>TL{ciro.toLocaleString()}</div>
        <div style={{ display:"flex", gap:16, marginTop:8 }}>
          <div><span style={{ color:C.muted, fontSize:12 }}>Satis: </span><span style={{ fontWeight:600, fontSize:13 }}>{satisSayisi} adet</span></div>
          <div><span style={{ color:C.muted, fontSize:12 }}>Masraf: </span><span style={{ fontWeight:600, fontSize:13, color:C.red }}>-TL{masraf.toLocaleString()}</span></div>
          <div><span style={{ color:C.muted, fontSize:12 }}>Net: </span><span style={{ fontWeight:700, fontSize:13, color:(ciro-masraf)>=0?C.green:C.red }}>TL{(ciro-masraf).toLocaleString()}</span></div>
        </div>
      </Card>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <Card><div style={{ fontSize:18 }}>📊</div><div style={{ fontSize:20, fontWeight:700, color:C.green, marginTop:4 }}>TL{bugunCiro.toLocaleString()}</div><div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Bugun Ciro</div></Card>
        <Card><div style={{ fontSize:18 }}>📅</div><div style={{ fontSize:20, fontWeight:700, color:accent, marginTop:4 }}>TL{ayCiro.toLocaleString()}</div><div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Aylik Ciro</div></Card>
        <Card><div style={{ fontSize:18 }}>💸</div><div style={{ fontSize:20, fontWeight:700, color:C.red, marginTop:4 }}>TL{ayMasraf.toLocaleString()}</div><div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Aylik Masraf</div></Card>
        <Card><div style={{ fontSize:18 }}>⚠️</div><div style={{ fontSize:20, fontWeight:700, color:dusukStok.length>0?C.red:C.green, marginTop:4 }}>{dusukStok.length} urun</div><div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Dusuk Stok</div></Card>
      </div>
      {dusukStok.length > 0 && (
        <Card style={{ border:"1px solid "+C.red+"44", background:C.red+"0a" }}>
          <div style={{ color:C.red, fontWeight:600, marginBottom:10 }}>🔴 Dusuk Stok Uyarisi</div>
          {dusukStok.map(m => (
            <div key={m.id} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid "+C.border, fontSize:14 }}>
              <span>{m.ad}</span><span style={{ color:C.red }}>{m.stok} {m.birim}</span>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
};

const Malzemeler = ({ isletmeId, malzemeler, setMalzemeler, cevrimici }) => {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ ad:"", birim:"adet", stok:"", min_stok:"", fiyat:"" });
  const [islemModal, setIslemModal] = useState(null);
  const [islemForm, setIslemForm] = useState({ miktar:"", sebep:"" });
  const [filtre, setFiltre] = useState("tum");

  const kaydet = async () => {
    if (!form.ad) return;
    if (!cevrimici) { alert("Internet baglantisi gerekli."); return; }
    if (modal === "yeni") {
      const { data } = await sb.from("malzemeler").insert({ ...form, stok:+form.stok, min_stok:+form.min_stok, fiyat:+form.fiyat, isletme_id:isletmeId }).select().single();
      const yeni = [...malzemeler, data]; setMalzemeler(yeni); localCache.set("malzemeler_"+isletmeId, yeni);
    } else {
      await sb.from("malzemeler").update({ ...form, stok:+form.stok, min_stok:+form.min_stok, fiyat:+form.fiyat }).eq("id", modal);
      const yeni = malzemeler.map(m => m.id===modal ? {...m,...form,stok:+form.stok,min_stok:+form.min_stok,fiyat:+form.fiyat} : m);
      setMalzemeler(yeni); localCache.set("malzemeler_"+isletmeId, yeni);
    }
    setModal(null);
  };

  const sil = async (id) => {
    if (!cevrimici) { alert("Silmek icin internet gerekli."); return; }
    await sb.from("malzemeler").delete().eq("id", id);
    const yeni = malzemeler.filter(m => m.id !== id); setMalzemeler(yeni); localCache.set("malzemeler_"+isletmeId, yeni);
  };

  const islemYap = async () => {
    if (!islemForm.miktar) return;
    const m = malzemeler.find(x => x.id === islemModal.id);
    const yeniStok = islemModal.tip==="ekle" ? m.stok + +islemForm.miktar : Math.max(0, m.stok - +islemForm.miktar);
    await sb.from("malzemeler").update({ stok:yeniStok }).eq("id", islemModal.id);
    if (islemModal.tip==="zayi" && islemForm.sebep) {
      await sb.from("satislar").insert({ isletme_id:isletmeId, items:[{ad:"ZAYI: "+m.ad, qty:+islemForm.miktar, sebep:islemForm.sebep}], toplam:0, tarih:new Date().toISOString(), tip:"zayi" });
    }
    const yeni = malzemeler.map(x => x.id===islemModal.id ? {...x, stok:yeniStok} : x);
    setMalzemeler(yeni); localCache.set("malzemeler_"+isletmeId, yeni);
    setIslemModal(null); setIslemForm({ miktar:"", sebep:"" });
  };

  const gosterilen = filtre==="dusuk" ? malzemeler.filter(m => m.stok<=m.min_stok) : malzemeler;

  return (
    <div className="fade-in" style={{ padding:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <span style={{ fontFamily:"Syne", fontSize:20, fontWeight:700 }}>Malzemeler</span>
        <Btn small onClick={() => { setForm({ad:"",birim:"adet",stok:"",min_stok:"",fiyat:""}); setModal("yeni"); }}>+ Ekle</Btn>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {[["tum","Tumu"],["dusuk","Dusuk Stok"]].map(([k,l]) => (
          <button key={k} onClick={() => setFiltre(k)}
            style={{ background:filtre===k?C.accent:C.card, color:filtre===k?"#000":"#fff", border:"1px solid "+(filtre===k?C.accent:C.border), borderRadius:20, padding:"6px 14px", fontSize:13, cursor:"pointer" }}>{l}</button>
        ))}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {gosterilen.map(m => {
          const dusuk = m.stok <= m.min_stok;
          return (
            <Card key={m.id} style={dusuk?{border:"1px solid "+C.red+"44"}:{}}>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <div><div style={{ fontWeight:600 }}>{m.ad}</div><div style={{ fontSize:13, color:C.muted }}>Birim: {m.birim} - TL{m.fiyat}</div></div>
                <Badge color={dusuk?C.red:C.green}>{m.stok} {m.birim}</Badge>
              </div>
              <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>Min: {m.min_stok} {m.birim}</div>
              <div style={{ display:"flex", gap:8, marginTop:10 }}>
                <Btn small variant="success" onClick={() => { setIslemModal({tip:"ekle",id:m.id}); setIslemForm({miktar:"",sebep:""}); }}>Stok Ekle</Btn>
                <Btn small variant="danger" onClick={() => { setIslemModal({tip:"zayi",id:m.id}); setIslemForm({miktar:"",sebep:""}); }}>Zayi</Btn>
                <Btn small variant="ghost" onClick={() => { setForm({ad:m.ad,birim:m.birim,stok:m.stok,min_stok:m.min_stok,fiyat:m.fiyat}); setModal(m.id); }}>Duzenle</Btn>
                <Btn small variant="danger" onClick={() => sil(m.id)}>Sil</Btn>
              </div>
            </Card>
          );
        })}
        {gosterilen.length===0 && <div style={{ color:C.muted, textAlign:"center", padding:40 }}>Henuz malzeme yok</div>}
      </div>
      {modal && (
        <Modal title={modal==="yeni"?"Yeni Malzeme":"Duzenle"} onClose={() => setModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <input placeholder="Malzeme adi" value={form.ad} onChange={e => setForm({...form,ad:e.target.value})} />
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <input placeholder="Birim" value={form.birim} onChange={e => setForm({...form,birim:e.target.value})} />
              <input type="number" placeholder="Maliyet" value={form.fiyat} onChange={e => setForm({...form,fiyat:e.target.value})} />
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <input type="number" placeholder="Mevcut stok" value={form.stok} onChange={e => setForm({...form,stok:e.target.value})} />
              <input type="number" placeholder="Min. stok" value={form.min_stok} onChange={e => setForm({...form,min_stok:e.target.value})} />
            </div>
            <Btn onClick={kaydet}>Kaydet</Btn>
          </div>
        </Modal>
      )}
      {islemModal && (
        <Modal title={islemModal.tip==="ekle"?"Stok Ekle":"Zayi Girisi"} onClose={() => setIslemModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <input type="number" placeholder={islemModal.tip==="ekle"?"Eklenecek miktar":"Zayi miktari"} value={islemForm.miktar} onChange={e => setIslemForm({...islemForm,miktar:e.target.value})} />
            {islemModal.tip==="zayi" && <input placeholder="Zayi sebebi" value={islemForm.sebep} onChange={e => setIslemForm({...islemForm,sebep:e.target.value})} />}
            <Btn variant={islemModal.tip==="ekle"?"success":"danger"} onClick={islemYap}>{islemModal.tip==="ekle"?"Stok Ekle":"Zayi Kaydet"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

const MenuSayfasi = ({ isletmeId, menu, setMenu, malzemeler, kategoriler, setKategoriler }) => {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ ad:"", fiyat:"", maliyet:"", malzemeler:[], kategori_id:"", fotograf_url:"" });
  const [malzForm, setMalzForm] = useState({ id:"", qty:"" });
  const [aktifKategori, setAktifKategori] = useState("tum");
  const [kategoriModal, setKategoriModal] = useState(false);
  const [yeniKategori, setYeniKategori] = useState("");
  const [karlilık, setKarlilik] = useState(false);

  const kaydet = async () => {
    if (!form.ad || !form.fiyat) return;
    const veri = { ...form, fiyat:+form.fiyat, maliyet:+form.maliyet||0, isletme_id:isletmeId, kategori_id:form.kategori_id?+form.kategori_id:null };
    if (modal==="yeni") { const {data}=await sb.from("menu").insert(veri).select().single(); setMenu([...menu,data]); }
    else { await sb.from("menu").update(veri).eq("id",modal); setMenu(menu.map(m=>m.id===modal?{...m,...veri}:m)); }
    setModal(null);
  };
  const sil = async (id) => { await sb.from("menu").delete().eq("id",id); setMenu(menu.filter(m=>m.id!==id)); };
  const malzEkle = () => {
    if (!malzForm.id||!malzForm.qty) return;
    setForm({...form, malzemeler:[...(form.malzemeler||[]).filter(m=>m.id!==+malzForm.id),{id:+malzForm.id,qty:+malzForm.qty}]});
    setMalzForm({id:"",qty:""});
  };
  const kategoriEkle = async () => {
    if (!yeniKategori) return;
    const {data}=await sb.from("kategoriler").insert({isletme_id:isletmeId,ad:yeniKategori}).select().single();
    setKategoriler([...kategoriler,data]); setYeniKategori(""); setKategoriModal(false);
  };
  const kategoriSil = async (id) => { await sb.from("kategoriler").delete().eq("id",id); setKategoriler(kategoriler.filter(k=>k.id!==id)); };
  const filtreliMenu = aktifKategori==="tum"?menu:aktifKategori==="kategorisiz"?menu.filter(m=>!m.kategori_id):menu.filter(m=>m.kategori_id===aktifKategori);

  return (
    <div className="fade-in" style={{ padding:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <span style={{ fontFamily:"Syne", fontSize:20, fontWeight:700 }}>Menu</span>
        <div style={{ display:"flex", gap:8 }}>
          <Btn small variant="ghost" onClick={() => setKarlilik(!karlilık)}>{karlilık?"Gizle":"Karlilik"}</Btn>
          <Btn small variant="ghost" onClick={() => setKategoriModal(true)}>Kategoriler</Btn>
          <Btn small onClick={() => { setForm({ad:"",fiyat:"",maliyet:"",malzemeler:[],kategori_id:"",fotograf_url:""}); setModal("yeni"); }}>+ Ekle</Btn>
        </div>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14, overflowX:"auto", paddingBottom:4 }}>
        {[{id:"tum",ad:"Tumu"},{id:"kategorisiz",ad:"Kategorisiz"},...kategoriler].map(k => (
          <button key={k.id} onClick={() => setAktifKategori(k.id)}
            style={{ background:aktifKategori===k.id?C.accent:C.card, color:aktifKategori===k.id?"#000":"#fff", border:"1px solid "+(aktifKategori===k.id?C.accent:C.border), borderRadius:20, padding:"6px 14px", fontSize:13, cursor:"pointer", whiteSpace:"nowrap" }}>{k.ad}</button>
        ))}
      </div>
      {karlilık && (
        <Card style={{ marginBottom:14, background:C.green+"0a", border:"1px solid "+C.green+"44" }}>
          <div style={{ fontWeight:600, color:C.green, marginBottom:10, fontSize:13 }}>KARLILIK ANALIZI</div>
          {[...filtreliMenu].sort((a,b)=>(b.fiyat-(b.maliyet||0))-(a.fiyat-(a.maliyet||0))).map(m => {
            const kar = m.fiyat - (m.maliyet||0);
            const oran = m.fiyat>0 ? Math.round((kar/m.fiyat)*100) : 0;
            return (
              <div key={m.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid "+C.border }}>
                <div>
                  <div style={{ fontWeight:600, fontSize:14 }}>{m.ad}</div>
                  <div style={{ fontSize:12, color:C.muted }}>Satis: TL{m.fiyat} - Maliyet: TL{m.maliyet||0}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontWeight:700, color:kar>=0?C.green:C.red }}>TL{kar.toFixed(0)}</div>
                  <div style={{ fontSize:11, color:C.muted }}>%{oran} kar</div>
                </div>
              </div>
            );
          })}
        </Card>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {filtreliMenu.map(m => {
          const kat = kategoriler.find(k=>k.id===m.kategori_id);
          const kar = m.fiyat-(m.maliyet||0);
          const oran = m.fiyat>0?Math.round((kar/m.fiyat)*100):0;
          return (
            <Card key={m.id}>
              <div style={{ display:"flex", gap:12 }}>
                {m.fotograf_url ? <img src={m.fotograf_url} style={{ width:64, height:64, borderRadius:10, objectFit:"cover", flexShrink:0 }} /> : <div style={{ width:64, height:64, borderRadius:10, background:C.surface, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>🍽️</div>}
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <div style={{ fontWeight:600 }}>{m.ad}</div>
                    <span style={{ color:C.accent, fontWeight:700 }}>TL{m.fiyat}</span>
                  </div>
                  {kat && <Badge color={C.muted}>{kat.ad}</Badge>}
                  {m.maliyet>0 && <div style={{ fontSize:12, color:kar>=0?C.green:C.red, marginTop:2 }}>Kar: TL{kar.toFixed(0)} (%{oran})</div>}
                  <div style={{ display:"flex", gap:8, marginTop:8 }}>
                    <Btn small variant="ghost" onClick={() => { setForm({ad:m.ad,fiyat:m.fiyat,maliyet:m.maliyet||"",malzemeler:m.malzemeler||[],kategori_id:m.kategori_id||"",fotograf_url:m.fotograf_url||""}); setModal(m.id); }}>Duzenle</Btn>
                    <Btn small variant="danger" onClick={() => sil(m.id)}>Sil</Btn>
                  </div>
                </div>
              </div>
            </Card>
          );
        })}
        {filtreliMenu.length===0 && <div style={{ color:C.muted, textAlign:"center", padding:40 }}>Bu kategoride urun yok</div>}
      </div>
      {modal && (
        <Modal title={modal==="yeni"?"Yeni Urun":"Duzenle"} onClose={() => setModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <input placeholder="Urun adi" value={form.ad} onChange={e => setForm({...form,ad:e.target.value})} />
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <input type="number" placeholder="Satis fiyati" value={form.fiyat} onChange={e => setForm({...form,fiyat:e.target.value})} />
              <input type="number" placeholder="Maliyet (TL)" value={form.maliyet} onChange={e => setForm({...form,maliyet:e.target.value})} />
            </div>
            <select value={form.kategori_id} onChange={e => setForm({...form,kategori_id:e.target.value})}>
              <option value="">Kategori sec</option>
              {kategoriler.map(k=><option key={k.id} value={k.id}>{k.ad}</option>)}
            </select>
            {malzemeler.length>0 && (
              <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr auto", gap:8, alignItems:"center" }}>
                <select value={malzForm.id} onChange={e => setMalzForm({...malzForm,id:e.target.value})}>
                  <option value="">Malzeme sec</option>
                  {malzemeler.map(m=><option key={m.id} value={m.id}>{m.ad}</option>)}
                </select>
                <input type="number" placeholder="Miktar" value={malzForm.qty} onChange={e => setMalzForm({...malzForm,qty:e.target.value})} />
                <Btn small variant="ghost" onClick={malzEkle}>+</Btn>
              </div>
            )}
            <Btn onClick={kaydet}>Kaydet</Btn>
          </div>
        </Modal>
      )}
      {kategoriModal && (
        <Modal title="Kategori Yonetimi" onClose={() => setKategoriModal(false)}>
          <div style={{ display:"flex", gap:8, marginBottom:16 }}>
            <input placeholder="Yeni kategori adi" value={yeniKategori} onChange={e => setYeniKategori(e.target.value)} />
            <Btn small onClick={kategoriEkle}>Ekle</Btn>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {kategoriler.map(k=>(
              <div key={k.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid "+C.border }}>
                <span style={{ fontWeight:600 }}>{k.ad}</span>
                <Btn small variant="danger" onClick={() => kategoriSil(k.id)}>Sil</Btn>
              </div>
            ))}
            {kategoriler.length===0 && <div style={{ color:C.muted, textAlign:"center", padding:20 }}>Henuz kategori yok</div>}
          </div>
        </Modal>
      )}
    </div>
  );
};

const MutfakEkrani = ({ isletmeId }) => {
  const [adisyonlar, setAdisyonlar] = useState([]);
  const [masalar, setMasalar] = useState([]);
  useEffect(() => { veriYukle(); const interval=setInterval(veriYukle,10000); return () => clearInterval(interval); }, []);
  const veriYukle = async () => {
    const [{data:a},{data:m}] = await Promise.all([
      sb.from("adisyonlar").select("*").eq("isletme_id",isletmeId).eq("durum","acik").order("acilis_tarihi"),
      sb.from("masalar").select("*").eq("isletme_id",isletmeId),
    ]);
    setAdisyonlar(a?a.filter(x=>x.items&&x.items.length>0):[]);
    setMasalar(m||[]);
  };
  const durumGuncelle = async (id, durum) => { await sb.from("adisyonlar").update({mutfak_durum:durum}).eq("id",id); setAdisyonlar(a=>a.map(x=>x.id===id?{...x,mutfak_durum:durum}:x)); };
  const teslimEt = async (id) => { await sb.from("adisyonlar").update({mutfak_durum:"teslim"}).eq("id",id); setAdisyonlar(a=>a.filter(x=>x.id!==id)); };
  const masaAd = (masaId) => { const m=masalar.find(m=>m.id===masaId); return m?m.ad:"Bilinmeyen"; };
  const durumRenk = {bekliyor:C.red,hazirlaniyor:"#e8a830",hazir:C.green};

    <div style={{ padding:16 }}>

        <span style={{ fontFamily:"Syne", fontSize:22, fontWeight:800, color:C.accent }}>Mutfak Ekrani</span>

      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
        {adisyonlar.map(a => {
          const durum=a.mutfak_durum||"bekliyor"; const renk=durumRenk[durum]; const sure=Math.floor((new Date()-new Date(a.acilis_tarihi))/60000);
          return (
            <div key={a.id} style={{ background:C.card, border:"2px solid "+renk, borderRadius:16, padding:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <span style={{ fontFamily:"Syne", fontSize:18, fontWeight:700 }}>{masaAd(a.masa_id)}</span>
                <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                  <span style={{ color:C.muted, fontSize:12 }}>{sure} dk</span>
                  <Badge color={renk}>{durumLabel[durum]}</Badge>
                </div>
              </div>
              {(a.items||[]).map((item,i)=><div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid "+C.border, fontSize:15 }}><span style={{ fontWeight:600 }}>{item.ad}</span><span style={{ color:C.accent, fontWeight:700 }}>x{item.qty}</span></div>)}
              <div style={{ display:"flex", gap:8, marginTop:14 }}>
                {durum==="bekliyor" && <Btn variant="ghost" style={{ flex:1 }} onClick={() => durumGuncelle(a.id,"hazirlaniyor")}>Hazirlanıyor</Btn>}
                {durum==="hazirlaniyor" && <Btn variant="success" style={{ flex:1 }} onClick={() => durumGuncelle(a.id,"hazir")}>Hazir</Btn>}
                {durum==="hazir" && <div style={{ display:"flex", gap:8, flex:1 }}><div style={{ color:C.green, fontWeight:600, flex:1, display:"flex", alignItems:"center" }}>Servise Hazir!</div><Btn variant="success" onClick={() => teslimEt(a.id)}>Teslim Edildi</Btn></div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

    "<div class='c'></div><div class='s b'><span>TOPLAM</span><span>TL"+toplam.toFixed(0)+"</span></div>" +

const Masalar = ({ isletmeId, kullaniciId, menu, malzemeler, setMalzemeler, setSatislar, accent, kategoriler }) => {
  const [masalar, setMasalar] = useState([]);
  const [adisyonlar, setAdisyonlar] = useState([]);
  const [seciliMasa, setSeciliMasa] = useState(null);
  const [adisyonEkran, setAdisyonEkran] = useState(false);
  const [masaModal, setMasaModal] = useState(false);
  const [yeniMasaAd, setYeniMasaAd] = useState("");
  const [odemeModal, setOdemeModal] = useState(false);
  const [yukleniyor, setYukleniyor] = useState(true);
  const [aktifKat, setAktifKat] = useState("tum");
  const [indiriModal, setIndiriModal] = useState(false);
  const [indiriOran, setIndiriOran] = useState("");
  const [ikramModal, setIkramModal] = useState(false);
  const [bolmeModal, setBolmeModal] = useState(false);
  const [bolmeItems, setBolmeItems] = useState([]);
  const [tasimaMasaId, setTasimaMasaId] = useState("");
  const [eAdisyonModal, setEAdisyonModal] = useState(false);
  const [eAdisyonForm, setEAdisyonForm] = useState({musteriAd:"",tcVergi:"",adres:""});

  useEffect(() => { veriYukle(); }, []);

  const veriYukle = async () => {
    setYukleniyor(true);
    const [{data:m},{data:a}] = await Promise.all([
      sb.from("masalar").select("*").eq("isletme_id",isletmeId).order("id"),
      sb.from("adisyonlar").select("*").eq("isletme_id",isletmeId).eq("durum","acik"),
    ]);
    setMasalar(m||[]); setAdisyonlar(a||[]); setYukleniyor(false);
  };

  const masaEkle = async () => {
    if (!yeniMasaAd) return;
    const {data}=await sb.from("masalar").insert({isletme_id:isletmeId,ad:yeniMasaAd,durum:"bos"}).select().single();
    setMasalar(m=>[...m,data]); setMasaModal(false); setYeniMasaAd("");
  };

  const adisyonAc = async (masa) => {
    const mevcut = adisyonlar.find(a=>a.masa_id===masa.id);
    if (mevcut) { setSeciliMasa({...masa,adisyon:mevcut}); setAdisyonEkran(true); return; }
    const {data}=await sb.from("adisyonlar").insert({isletme_id:isletmeId,masa_id:masa.id,kullanici_id:kullaniciId,items:[],durum:"acik",toplam:0}).select().single();
    await sb.from("masalar").update({durum:"dolu"}).eq("id",masa.id);
    setMasalar(m=>m.map(x=>x.id===masa.id?{...x,durum:"dolu"}:x));
    setAdisyonlar(a=>[...a,data]);
    setSeciliMasa({...masa,durum:"dolu",adisyon:data}); setAdisyonEkran(true);
  };

  const urunEkle = async (menuItem) => {
    if (!menuItem) return;
    const adisyon=seciliMasa.adisyon; const mevcutItems=adisyon.items||[];
    const var_=mevcutItems.find(x=>x.menuId===menuItem.id&&!x.ikram);
    const yeniItems=var_?mevcutItems.map(x=>x.menuId===menuItem.id&&!x.ikram?{...x,qty:x.qty+1}:x):[...mevcutItems,{menuId:menuItem.id,ad:menuItem.ad,fiyat:menuItem.fiyat,qty:1}];
    const yeniToplam=yeniItems.reduce((t,x)=>t+x.fiyat*x.qty,0);
    await sb.from("adisyonlar").update({items:yeniItems,toplam:yeniToplam}).eq("id",adisyon.id);
    const yeniAdisyon={...adisyon,items:yeniItems,toplam:yeniToplam};
    setAdisyonlar(a=>a.map(x=>x.id===adisyon.id?yeniAdisyon:x)); setSeciliMasa(m=>({...m,adisyon:yeniAdisyon}));
  };

  const urunCikar = async (menuId) => {
    const adisyon=seciliMasa.adisyon;
    const yeniItems=(adisyon.items||[]).map(x=>x.menuId===menuId&&!x.ikram?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0);
    const yeniToplam=yeniItems.reduce((t,x)=>t+x.fiyat*x.qty,0);
    await sb.from("adisyonlar").update({items:yeniItems,toplam:yeniToplam}).eq("id",adisyon.id);
    const yeniAdisyon={...adisyon,items:yeniItems,toplam:yeniToplam};
    setAdisyonlar(a=>a.map(x=>x.id===adisyon.id?yeniAdisyon:x)); setSeciliMasa(m=>({...m,adisyon:yeniAdisyon}));
  };

  const indirimUygula = async () => {
    if (!indiriOran) return;
    const adisyon=seciliMasa.adisyon; const oran=Math.min(100,Math.max(0,+indiriOran));
    const hamToplam=adisyon.items.filter(x=>!x.ikram).reduce((t,x)=>t+x.fiyat*x.qty,0);
    const yeniToplam=+(hamToplam*(1-oran/100)).toFixed(2);
    await sb.from("adisyonlar").update({indirim_oran:oran,toplam:yeniToplam}).eq("id",adisyon.id);
    const yeniAdisyon={...adisyon,indirim_oran:oran,toplam:yeniToplam};
    setAdisyonlar(a=>a.map(x=>x.id===adisyon.id?yeniAdisyon:x)); setSeciliMasa(m=>({...m,adisyon:yeniAdisyon}));
    setIndiriModal(false); setIndiriOran("");
  };

  const ikramEkle = async (menuItem) => {
    const adisyon=seciliMasa.adisyon;
    const yeniItems=[...(adisyon.items||[]),{menuId:menuItem.id,ad:menuItem.ad+" (Ikram)",fiyat:0,qty:1,ikram:true}];
    await sb.from("adisyonlar").update({items:yeniItems}).eq("id",adisyon.id);
    const yeniAdisyon={...adisyon,items:yeniItems};
    setAdisyonlar(a=>a.map(x=>x.id===adisyon.id?yeniAdisyon:x)); setSeciliMasa(m=>({...m,adisyon:yeniAdisyon}));
    setIkramModal(false);
  };

  const adisyonBol = async () => {
    if (!bolmeItems.length||!tasimaMasaId) return;
    const adisyon=seciliMasa.adisyon;
    const kalanItems=(adisyon.items||[]).filter(x=>!bolmeItems.find(b=>b.menuId===x.menuId&&!x.ikram));
    const kalanToplam=kalanItems.reduce((t,x)=>t+x.fiyat*x.qty,0);
    const tasinanToplam=bolmeItems.reduce((t,x)=>t+x.fiyat*x.qty,0);
    await sb.from("adisyonlar").update({items:kalanItems,toplam:kalanToplam}).eq("id",adisyon.id);
    const hedef=adisyonlar.find(a=>a.masa_id===+tasimaMasaId);
    if (hedef) {
      const hedefItems=[...(hedef.items||[]),...bolmeItems];
      await sb.from("adisyonlar").update({items:hedefItems,toplam:hedef.toplam+tasinanToplam}).eq("id",hedef.id);
    } else {
      await sb.from("adisyonlar").insert({isletme_id:isletmeId,masa_id:+tasimaMasaId,kullanici_id:kullaniciId,items:bolmeItems,durum:"acik",toplam:tasinanToplam});
      await sb.from("masalar").update({durum:"dolu"}).eq("id",+tasimaMasaId);
    }
    const yeniAdisyon={...adisyon,items:kalanItems,toplam:kalanToplam};
    setAdisyonlar(a=>a.map(x=>x.id===adisyon.id?yeniAdisyon:x)); setSeciliMasa(m=>({...m,adisyon:yeniAdisyon}));
    setBolmeModal(false); setBolmeItems([]); setTasimaMasaId(""); await veriYukle();
  };

  const hesapKapat = async (odemeTipi) => {
    const adisyon=seciliMasa.adisyon;
    if (!adisyon.items||!adisyon.items.length) return;
    if (eAdisyonForm.musteriAd) {
      await sb.from("satislar").insert({isletme_id:isletmeId,kullanici_id:kullaniciId,items:adisyon.items,toplam:adisyon.toplam,tarih:new Date().toISOString(),masa:seciliMasa.ad,odeme_tipi:odemeTipi,musteri_ad:eAdisyonForm.musteriAd,tc_vergi:eAdisyonForm.tcVergi,musteri_adres:eAdisyonForm.adres}).select().single();
    }
    const yeniMalzemeler=malzemeler.map(m=>{
      let azalan=0;
      (adisyon.items||[]).forEach(item=>{const mi=menu.find(x=>x.id===item.menuId);const ml=mi&&mi.malzemeler?mi.malzemeler.find(x=>x.id===m.id):null;if(ml)azalan+=ml.qty*item.qty;});
      return {...m,stok:Math.max(0,m.stok-azalan)};
    });
    for(let i=0;i<yeniMalzemeler.length;i++) await sb.from("malzemeler").update({stok:yeniMalzemeler[i].stok}).eq("id",yeniMalzemeler[i].id);
    setMalzemeler(yeniMalzemeler);
    await sb.from("adisyonlar").update({durum:"kapali",kapanis_tarihi:new Date().toISOString(),odeme_tipi:odemeTipi}).eq("id",adisyon.id);
    const {data:satis}=await sb.from("satislar").insert({isletme_id:isletmeId,kullanici_id:kullaniciId,items:adisyon.items,toplam:adisyon.toplam,tarih:new Date().toISOString(),masa:seciliMasa.ad,odeme_tipi:odemeTipi,indirim_oran:adisyon.indirim_oran||0}).select().single();
    setSatislar(s=>[...s,satis]);
    await sb.from("masalar").update({durum:"bos"}).eq("id",seciliMasa.id);
    setMasalar(m=>m.map(x=>x.id===seciliMasa.id?{...x,durum:"bos"}:x));
    setAdisyonlar(a=>a.filter(x=>x.id!==adisyon.id));
    fisYazdir(seciliMasa.ad,adisyon.items,adisyon.toplam,null,odemeTipi);
    setOdemeModal(false); setEAdisyonModal(false); setAdisyonEkran(false); setSeciliMasa(null);
    setEAdisyonForm({musteriAd:"",tcVergi:"",adres:""});
  };

  const masaDurumRenk = (masa) => {
    const adisyon=adisyonlar.find(a=>a.masa_id===masa.id);
    if (!adisyon) return {bg:C.card,border:C.border,label:"Bos",color:C.muted};
    if (adisyon.items&&adisyon.items.length>0) return {bg:C.accent+"11",border:C.accent+"44",label:"TL"+adisyon.toplam,color:C.accent};
    return {bg:C.green+"11",border:C.green+"44",label:"Acik",color:C.green};
  };

  if (yukleniyor) return <Spinner />;

  if (adisyonEkran && seciliMasa) {
    const adisyon=seciliMasa.adisyon; const items=adisyon?(adisyon.items||[]):[];
    const toplam=items.reduce((t,x)=>t+x.fiyat*x.qty,0);
    return (
      <div className="fade-in" style={{ padding:16 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
          <Btn small variant="ghost" onClick={() => { setAdisyonEkran(false); setSeciliMasa(null); }}>Geri</Btn>
          <span style={{ fontFamily:"Syne", fontSize:18, fontWeight:700 }}>🪑 {seciliMasa.ad}</span>
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:12, overflowX:"auto", paddingBottom:4 }}>
          {[{id:"tum",ad:"Tumu"},...kategoriler].map(k=>(
            <button key={k.id} onClick={() => setAktifKat(k.id)}
              style={{ background:aktifKat===k.id?(accent||C.accent):C.card, color:aktifKat===k.id?"#000":"#fff", border:"1px solid "+(aktifKat===k.id?(accent||C.accent):C.border), borderRadius:20, padding:"6px 14px", fontSize:12, cursor:"pointer", whiteSpace:"nowrap" }}>{k.ad}</button>
          ))}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
          {menu.filter(m=>aktifKat==="tum"||m.kategori_id===aktifKat).map(m=>(
            <div key={m.id} onClick={() => urunEkle(m)} style={{ background:C.card, border:"1px solid "+C.border, borderRadius:14, overflow:"hidden", cursor:"pointer" }}>
              {m.fotograf_url?<img src={m.fotograf_url} style={{ width:"100%",height:80,objectFit:"cover" }}/>:<div style={{ width:"100%",height:80,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28 }}>🍽️</div>}
              <div style={{ padding:"8px 10px" }}><div style={{ fontWeight:600,fontSize:13 }}>{m.ad}</div><div style={{ color:accent||C.accent,fontWeight:700,fontSize:14,marginTop:2 }}>TL{m.fiyat}</div></div>
            </div>
          ))}
        </div>
        {items.length>0?(
          <Card style={{ border:"1px solid "+(accent||C.accent)+"44" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontWeight:600, color:accent||C.accent }}>🧾 Adisyon</div>
              <div style={{ display:"flex", gap:6 }}>
                <Btn small variant="ghost" onClick={() => setBolmeModal(true)}>Bol</Btn>
                <Btn small variant="ghost" onClick={() => setIkramModal(true)}>Ikram</Btn>
                <Btn small variant="ghost" onClick={() => setIndiriModal(true)}>Indirim</Btn>
              </div>
            </div>
            {items.map(item=>(
              <div key={item.menuId+(item.ikram?"_ikram":"")} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid "+C.border }}>
                <span style={{ fontSize:14, color:item.ikram?C.green:C.text }}>{item.ad}</span>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  {item.ikram?<span style={{ color:C.green,fontSize:12 }}>Ikram</span>:<span style={{ color:C.muted,fontSize:13 }}>TL{(item.fiyat*item.qty).toFixed(0)}</span>}
                  {!item.ikram&&<button onClick={() => urunCikar(item.menuId)} style={{ background:C.border,border:"none",color:C.text,borderRadius:6,width:26,height:26,cursor:"pointer" }}>-</button>}
                  <span style={{ width:20,textAlign:"center",fontWeight:600 }}>{item.qty}</span>
                  {!item.ikram&&<button onClick={() => urunEkle(menu.find(m=>m.id===item.menuId))} style={{ background:accent||C.accent,border:"none",color:"#000",borderRadius:6,width:26,height:26,cursor:"pointer" }}>+</button>}
                  {item.ikram&&<button onClick={async()=>{const yeniItems=(adisyon.items||[]).filter(x=>!(x.menuId===item.menuId&&x.ikram));const yT=yeniItems.reduce((t,x)=>t+x.fiyat*x.qty,0);await sb.from("adisyonlar").update({items:yeniItems,toplam:yT}).eq("id",adisyon.id);const yA={...adisyon,items:yeniItems,toplam:yT};setAdisyonlar(a=>a.map(x=>x.id===adisyon.id?yA:x));setSeciliMasa(m=>({...m,adisyon:yA}));}} style={{ background:C.red+"22",border:"none",color:C.red,borderRadius:6,width:26,height:26,cursor:"pointer" }}>x</button>}
                </div>

        ))}

        <div style={{ fontSize:12,color:C.muted }}>Toplam Masraf</div>
        <div style={{ fontFamily:"Syne",fontSize:28,fontWeight:800,color:C.red }}>TL{toplam.toLocaleString()}</div>
