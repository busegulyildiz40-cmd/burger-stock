<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BurgerStock</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0e0c; color: #f0ebe3; font-family: 'DM Sans', sans-serif; }
    input, select { outline: none; background: #1a1814; color: #f0ebe3; border: 1px solid #2e2b26; border-radius: 10px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%; transition: border 0.2s; }
    input:focus, select:focus { border-color: var(--accent, #f5a623); }
    input::placeholder { color: #8a847a; }
    button { cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; transition: all 0.18s; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    .badge-pulse { animation: pulse 2s infinite; }
    .spin { animation: spin 1s linear infinite; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2e2b26; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = 'https://kdqwmkbtflperskelnok.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nSE0pMSTyyToqoVmZqKseQ_3BIm-g6w';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const C = {
  bg: "#0f0e0c", surface: "#1a1814", card: "#201e1a", border: "#2e2b26",
  accent: "#f5a623", red: "#e05252", green: "#52c97a", text: "#f0ebe3", muted: "#8a847a",
};

const Card = ({ children, style }) => (
  <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 16, ...style }}>{children}</div>
);

const Btn = ({ children, onClick, variant = "primary", style, small, disabled }) => {
  const styles = {
    primary: { background: C.accent, color: "#000", padding: small ? "8px 14px" : "11px 20px" },
    ghost: { background: "transparent", color: C.text, border: `1px solid ${C.border}`, padding: small ? "8px 14px" : "11px 20px" },
    danger: { background: C.red + "22", color: C.red, border: `1px solid ${C.red}44`, padding: small ? "8px 14px" : "11px 20px" },
    success: { background: C.green + "22", color: C.green, border: `1px solid ${C.green}44`, padding: small ? "8px 14px" : "11px 20px" },
  };
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ ...styles[variant], borderRadius: 10, fontWeight: 500, opacity: disabled ? 0.5 : 1, ...style }}>
      {children}
    </button>
  );
};

const Badge = ({ children, color }) => (
  <span style={{ background: color + "22", color, borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 500 }}>{children}</span>
);

const Modal = ({ title, onClose, children }) => (
  <div style={{ position: "fixed", inset: 0, background: "#000a", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
    onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="fade-in" style={{ background: C.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 540, maxHeight: "90vh", overflow: "auto", padding: 24, border: `1px solid ${C.border}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <span style={{ fontFamily: "Syne", fontSize: 18, fontWeight: 700 }}>{title}</span>
        <Btn variant="ghost" small onClick={onClose}>✕</Btn>
      </div>
      {children}
    </div>
  </div>
);

const Spinner = () => (
  <div style={{ display: "flex", justifyContent: "center", padding: 40 }}>
    <div className="spin" style={{ width: 32, height: 32, border: `3px solid ${C.border}`, borderTopColor: C.accent, borderRadius: "50%" }} />
  </div>
);

// ─── GİRİŞ ──────────────────────────────────────────────────────────────────
const GirisEkrani = ({ onGiris }) => {
  const [email, setEmail] = useState("");
  const [sifre, setSifre] = useState("");
  const [hata, setHata] = useState("");
  const [yukleniyor, setYukleniyor] = useState(false);
  const [kayitModu, setKayitModu] = useState(false);
  const [isletmeAd, setIsletmeAd] = useState("");

  const girisYap = async () => {
    setHata(""); setYukleniyor(true);
    try {
      if (kayitModu) {
        const { data: authData, error: authErr } = await sb.auth.signUp({ email, password: sifre });
        if (authErr) throw authErr;
        const { data: isletme, error: isletmeErr } = await sb.from("isletmeler").insert({ ad: isletmeAd, renk: "#f5a623" }).select().single();
        if (isletmeErr) throw isletmeErr;
        await sb.from("kullanicilar").insert({ id: authData.user.id, isletme_id: isletme.id, email, rol: "mudur" });
        setHata("✅ Kayıt başarılı! Giriş yapabilirsin.");
        setKayitModu(false);
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: sifre });
        if (error) throw error;
        const { data: kullanici } = await sb.from("kullanicilar").select("*, isletmeler(*)").eq("id", data.user.id).single();
        onGiris(kullanici);
      }
    } catch (e) {
      setHata(e.message === "Invalid login credentials" ? "E-posta veya şifre hatalı." : e.message);
    }
    setYukleniyor(false);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: C.bg }}>
      <div className="fade-in" style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>🍔</div>
          <div style={{ fontFamily: "Syne", fontSize: 28, fontWeight: 800, color: C.accent }}>BurgerStock</div>
          <div style={{ color: C.muted, fontSize: 14, marginTop: 4 }}>Restoran & Kafe Stok Yönetimi</div>
        </div>
        <Card>
          <div style={{ fontFamily: "Syne", fontSize: 18, fontWeight: 700, marginBottom: 20 }}>
            {kayitModu ? "Hesap Oluştur" : "Giriş Yap"}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {kayitModu && <input placeholder="İşletme adı" value={isletmeAd} onChange={e => setIsletmeAd(e.target.value)} />}
            <input type="email" placeholder="E-posta" value={email} onChange={e => setEmail(e.target.value)} />
            <input type="password" placeholder="Şifre" value={sifre} onChange={e => setSifre(e.target.value)} onKeyDown={e => e.key === "Enter" && girisYap()} />
            {hata && <div style={{ color: hata.startsWith("✅") ? C.green : C.red, fontSize: 13 }}>{hata}</div>}
            <Btn onClick={girisYap} disabled={yukleniyor}>{yukleniyor ? "Lütfen bekle..." : kayitModu ? "Hesap Oluştur" : "Giriş Yap"}</Btn>
            <div style={{ textAlign: "center", fontSize: 13, color: C.muted }}>
              {kayitModu ? "Hesabın var mı?" : "Hesabın yok mu?"}{" "}
              <span onClick={() => { setKayitModu(!kayitModu); setHata(""); }} style={{ color: C.accent, cursor: "pointer", fontWeight: 600 }}>
                {kayitModu ? "Giriş yap" : "Kayıt ol"}
              </span>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
};

// ─── AYARLAR (LOGO YÜKLEMELİ) ───────────────────────────────────────────────
const Ayarlar = ({ kullanici, setKullanici, tema, setTema }) => {
  const [isletme, setIsletme] = useState(kullanici.isletmeler);
  const [kayit, setKayit] = useState(false);
  const [yeniK, setYeniK] = useState({ email: "", sifre: "", rol: "kasiyer" });
  const [mesaj, setMesaj] = useState("");
  const [logoYukleniyor, setLogoYukleniyor] = useState(false);
  const fileRef = useRef();

  const isletmeGuncelle = async () => {
    const { error } = await sb.from("isletmeler").update({ ad: isletme.ad, renk: isletme.renk }).eq("id", isletme.id);
    if (!error) { setMesaj("✅ Kaydedildi!"); setTimeout(() => setMesaj(""), 2000); }
  };

  const logoYukle = async (e) => {
    const dosya = e.target.files[0];
    if (!dosya) return;
    setLogoYukleniyor(true);
    const dosyaAdi = `${isletme.id}-logo.${dosya.name.split('.').pop()}`;
    const { error: upErr } = await sb.storage.from("logolar").upload(dosyaAdi, dosya, { upsert: true });
    if (upErr) { setMesaj("❌ Logo yüklenemedi: " + upErr.message); setLogoYukleniyor(false); return; }
    const { data: urlData } = sb.storage.from("logolar").getPublicUrl(dosyaAdi);
    const logoUrl = urlData.publicUrl;
    await sb.from("isletmeler").update({ logo_url: logoUrl }).eq("id", isletme.id);
    setIsletme({ ...isletme, logo_url: logoUrl });
    setMesaj("✅ Logo yüklendi!"); setLogoYukleniyor(false);
    setTimeout(() => setMesaj(""), 2000);
  };

  const kasiyerEkle = async () => {
    try {
      const { data, error } = await sb.auth.signUp({ email: yeniK.email, password: yeniK.sifre });
      if (error) throw error;
      await sb.from("kullanicilar").insert({ id: data.user.id, isletme_id: isletme.id, email: yeniK.email, rol: yeniK.rol });
      setMesaj("✅ Kullanıcı eklendi!"); setYeniK({ email: "", sifre: "", rol: "kasiyer" }); setKayit(false);
      setTimeout(() => setMesaj(""), 2000);
    } catch (e) { setMesaj("❌ " + e.message); }
  };

  const cikisYap = async () => { await sb.auth.signOut(); window.location.replace(window.location.href.split('?')[0]); };

  return (
    <div className="fade-in" style={{ padding: 16 }}>
      <div style={{ fontFamily: "Syne", fontSize: 20, fontWeight: 700, marginBottom: 16 }}>Ayarlar</div>
      {mesaj && <div style={{ color: mesaj.startsWith("✅") ? C.green : C.red, marginBottom: 12, fontSize: 14 }}>{mesaj}</div>}

      <Card style={{ marginBottom: 12 }}>
        <div style={{ fontWeight: 600, marginBottom: 12, color: C.muted, fontSize: 13 }}>GÖRÜNÜM</div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontWeight:600, fontSize:14 }}>{tema === "dark" ? "🌙 Karanlık Tema" : "☀️ Açık Tema"}</div>
            <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Uygulama arka planı</div>
          </div>
          <div onClick={() => setTema(tema === "dark" ? "light" : "dark")}
            style={{ width:48, height:26, borderRadius:13, background: tema==="dark" ? C.accent : C.border, cursor:"pointer", position:"relative", transition:"all 0.2s" }}>
            <div style={{ position:"absolute", top:3, left: tema==="dark" ? 24:3, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"all 0.2s" }} />
          </div>
        </div>
      </Card>

      <Card style={{ marginBottom: 12 }}>
        <div style={{ fontWeight: 600, marginBottom: 12, color: C.muted, fontSize: 13 }}>İŞLETME BİLGİLERİ</div>

        {/* Logo */}
        <div style={{ marginBottom: 16, display: "flex", alignItems: "center", gap: 14 }}>
          <div onClick={() => fileRef.current.click()}
            style={{ width: 72, height: 72, borderRadius: 14, border: `2px dashed ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", overflow: "hidden", background: C.surface }}>
            {isletme.logo_url
              ? <img src={isletme.logo_url} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
              : <span style={{ fontSize: 28 }}>📷</span>}
          </div>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>İşletme Logosu</div>
            <Btn small variant="ghost" onClick={() => fileRef.current.click()} disabled={logoYukleniyor}>
              {logoYukleniyor ? "Yükleniyor..." : "Logo Seç"}
            </Btn>
            <input ref={fileRef} type="file" accept="image/*" onChange={logoYukle} style={{ display: "none" }} />
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <input placeholder="İşletme adı" value={isletme.ad} onChange={e => setIsletme({...isletme, ad: e.target.value})} />
          <div>
            <div style={{ fontSize: 13, color: C.muted, marginBottom: 6 }}>Marka Rengi</div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <input type="color" value={isletme.renk || "#f5a623"} onChange={e => setIsletme({...isletme, renk: e.target.value})}
                style={{ width: 48, height: 40, padding: 4, borderRadius: 8, cursor: "pointer" }} />
              <div style={{ width: 32, height: 32, borderRadius: 8, background: isletme.renk || "#f5a623" }} />
              <span style={{ color: C.muted, fontSize: 13 }}>{isletme.renk}</span>
            </div>
          </div>
          <Btn onClick={isletmeGuncelle}>Kaydet</Btn>
        </div>
      </Card>

      {kullanici.rol === "mudur" && (
        <Card style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontWeight: 600, color: C.muted, fontSize: 13 }}>KULLANICI EKLE</div>
            <Btn small variant="ghost" onClick={() => setKayit(!kayit)}>{kayit ? "İptal" : "+ Ekle"}</Btn>
          </div>
          {kayit && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <input placeholder="E-posta" value={yeniK.email} onChange={e => setYeniK({...yeniK, email: e.target.value})} />
              <input type="password" placeholder="Şifre" value={yeniK.sifre} onChange={e => setYeniK({...yeniK, sifre: e.target.value})} />
              <select value={yeniK.rol} onChange={e => setYeniK({...yeniK, rol: e.target.value})}>
                <option value="kasiyer">Kasiyer</option>
                <option value="mudur">Müdür</option>
              </select>
              <Btn onClick={kasiyerEkle}>Kullanıcı Ekle</Btn>
            </div>
          )}
        </Card>
      )}

      <Card>
        <div style={{ fontSize: 14, color: C.muted, marginBottom: 4 }}>Giriş yapan</div>
        <div style={{ fontWeight: 600, marginBottom: 6 }}>{kullanici.email}</div>
        <Badge color={kullanici.rol === "mudur" ? C.accent : C.green}>{kullanici.rol === "mudur" ? "Müdür" : "Kasiyer"}</Badge>
        <div style={{ marginTop: 16, display:"flex", gap:8 }}>
          <Btn variant="danger" onClick={cikisYap}>Çıkış Yap</Btn>
        </div>
      </Card>
    </div>
  );
};

// ─── DASHBOARD ──────────────────────────────────────────────────────────────
const Dashboard = ({ isletme, malzemeler, menu, satislar }) => {
  const accent = isletme?.renk || C.accent;
  const dusukStok = malzemeler.filter(m => m.stok <= m.min_stok);
  const bugun = new Date().toDateString();
  const bugunSatis = satislar.filter(s => new Date(s.tarih).toDateString() === bugun);
  const bugunCiro = bugunSatis.reduce((t, s) => t + s.toplam, 0);
  const toplamSatis = satislar.reduce((t, s) => t + s.toplam, 0);

  return (
    <div className="fade-in" style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        {isletme?.logo_url && (
          <img src={isletme.logo_url} style={{ width: 44, height: 44, borderRadius: 10, objectFit: "cover", border: `1px solid ${C.border}` }} />
        )}
        <div style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 800, color: accent }}>
          {!isletme?.logo_url && "🍔 "}{isletme?.ad || "BurgerStock"}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {[
          { label: "Bugün Ciro", val: `₺${bugunCiro.toLocaleString()}`, color: C.green, icon: "📈" },
          { label: "Bugün Satış", val: `${bugunSatis.length} sipariş`, color: accent, icon: "🧾" },
          { label: "Toplam Ciro", val: `₺${toplamSatis.toLocaleString()}`, color: C.text, icon: "💰" },
          { label: "Düşük Stok", val: `${dusukStok.length} ürün`, color: dusukStok.length > 0 ? C.red : C.green, icon: "⚠️" },
        ].map(s => (
          <Card key={s.label}>
            <div style={{ fontSize: 20 }}>{s.icon}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: s.color, marginTop: 4 }}>{s.val}</div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{s.label}</div>
          </Card>
        ))}
      </div>
      {dusukStok.length > 0 && (
        <Card style={{ border: `1px solid ${C.red}44`, background: C.red + "0a" }}>
          <div style={{ color: C.red, fontWeight: 600, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
            <span className="badge-pulse">🔴</span> Düşük Stok Uyarısı
          </div>
          {dusukStok.map(m => (
            <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.border}`, fontSize: 14 }}>
              <span>{m.ad}</span>
              <span style={{ color: C.red }}>{m.stok} {m.birim} <span style={{ color: C.muted }}>(min: {m.min_stok})</span></span>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
};

// ─── OFFLINE CACHE ──────────────────────────────────────────────────────────
const localCache = {
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
  get: (key) => { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } },
};

// ─── MALZEMELER ─────────────────────────────────────────────────────────────
const Malzemeler = ({ isletmeId, malzemeler, setMalzemeler, cevrimici }) => {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ ad: "", birim: "adet", stok: "", min_stok: "", fiyat: "" });
  const [islemModal, setIslemModal] = useState(null); // { tip: "ekle"|"zayi", id }
  const [islemForm, setIslemForm] = useState({ miktar: "", sebep: "" });
  const [filtre, setFiltre] = useState("tum"); // tum | dusuk

  const kaydet = async () => {
    if (!form.ad) return;
    if (!cevrimici) { alert("İnternet bağlantısı yok, bu işlem için internet gerekli."); return; }
    if (modal === "yeni") {
      const { data } = await sb.from("malzemeler").insert({ ...form, stok: +form.stok, min_stok: +form.min_stok, fiyat: +form.fiyat, isletme_id: isletmeId }).select().single();
      const yeni = [...malzemeler, data];
      setMalzemeler(yeni); localCache.set("malzemeler_" + isletmeId, yeni);
    } else {
      await sb.from("malzemeler").update({ ...form, stok: +form.stok, min_stok: +form.min_stok, fiyat: +form.fiyat }).eq("id", modal);
      const yeni = malzemeler.map(m => m.id === modal ? { ...m, ...form, stok: +form.stok, min_stok: +form.min_stok, fiyat: +form.fiyat } : m);
      setMalzemeler(yeni); localCache.set("malzemeler_" + isletmeId, yeni);
    }
    setModal(null);
  };

  const sil = async (id) => {
    if (!cevrimici) { alert("Silmek için internet gerekli."); return; }
    await sb.from("malzemeler").delete().eq("id", id);
    const yeni = malzemeler.filter(m => m.id !== id);
    setMalzemeler(yeni); localCache.set("malzemeler_" + isletmeId, yeni);
  };

  const islemYap = async () => {
    if (!islemForm.miktar) return;
    if (!cevrimici) { alert("Bu işlem için internet gerekli."); return; }
    const m = malzemeler.find(x => x.id === islemModal.id);
    let yeniStok;
    if (islemModal.tip === "ekle") {
      yeniStok = m.stok + +islemForm.miktar;
    } else {
      yeniStok = Math.max(0, m.stok - +islemForm.miktar);
    }
    await sb.from("malzemeler").update({ stok: yeniStok }).eq("id", islemModal.id);
    // Zayi kaydı için not ekle (basit log)
    if (islemModal.tip === "zayi" && islemForm.sebep) {
      await sb.from("satislar").insert({
        isletme_id: isletmeId,
        items: [{ ad: `ZAYİ: ${m.ad}`, qty: +islemForm.miktar, sebep: islemForm.sebep }],
        toplam: 0,
        tarih: new Date().toISOString(),
        tip: "zayi"
      });
    }
    const yeni = malzemeler.map(x => x.id === islemModal.id ? { ...x, stok: yeniStok } : x);
    setMalzemeler(yeni); localCache.set("malzemeler_" + isletmeId, yeni);
    setIslemModal(null); setIslemForm({ miktar: "", sebep: "" });
  };

  const gosterilen = filtre === "dusuk" ? malzemeler.filter(m => m.stok <= m.min_stok) : malzemeler;

  return (
    <div className="fade-in" style={{ padding: 16 }}>
      {!cevrimici && (
        <div style={{ background: C.warning+"22", border:`1px solid ${C.warning}44`, color: C.warning, borderRadius:10, padding:"8px 12px", marginBottom:12, fontSize:13, display:"flex", alignItems:"center", gap:6 }}>
          📡 Çevrimdışı mod — son kaydedilen veriler gösteriliyor
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontFamily: "Syne", fontSize: 20, fontWeight: 700 }}>Malzemeler</span>

// ─── MENÜ ───────────────────────────────────────────────────────────────────
const Menu = ({ isletmeId, menu, setMenu, malzemeler, kategoriler, setKategoriler }) => {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ ad: "", fiyat: "", malzemeler: [], kategori_id: "", fotograf_url: "" });
  const [malzForm, setMalzForm] = useState({ id: "", qty: "" });
  const [aktifKategori, setAktifKategori] = useState("tum");
  const [kategoriModal, setKategoriModal] = useState(false);
  const [yeniKategori, setYeniKategori] = useState("");
  const [fotografYukleniyor, setFotografYukleniyor] = useState(false);
  const fotografRef = useRef();

  const fotografYukle = async (e) => {
    const dosya = e.target.files[0];
    if (!dosya) return;
    setFotografYukleniyor(true);
    const dosyaAdi = `${isletmeId}-${Date.now()}.${dosya.name.split('.').pop()}`;
    const { error } = await sb.storage.from("urun-fotograflar").upload(dosyaAdi, dosya, { upsert: true });
    if (error) { setFotografYukleniyor(false); return; }
    const { data } = sb.storage.from("urun-fotograflar").getPublicUrl(dosyaAdi);
    setForm(f => ({...f, fotograf_url: data.publicUrl}));
    setFotografYukleniyor(false);
  };

  const kaydet = async () => {
    if (!form.ad || !form.fiyat) return;
    const veri = { ...form, fiyat: +form.fiyat, isletme_id: isletmeId, kategori_id: form.kategori_id ? +form.kategori_id : null };
    if (modal === "yeni") {
      const { data } = await sb.from("menu").insert(veri).select().single();
      setMenu([...menu, data]);
    } else {
      await sb.from("menu").update(veri).eq("id", modal);
      setMenu(menu.map(m => m.id === modal ? { ...m, ...veri } : m));
    }
    setModal(null);
  };

  const sil = async (id) => { await sb.from("menu").delete().eq("id", id); setMenu(menu.filter(m => m.id !== id)); };

  const malzEkle = () => {
    if (!malzForm.id || !malzForm.qty) return;
    setForm({...form, malzemeler: [...(form.malzemeler||[]).filter(m => m.id !== +malzForm.id), { id: +malzForm.id, qty: +malzForm.qty }]});
    setMalzForm({ id: "", qty: "" });
  };

  const kategoriEkle = async () => {
    if (!yeniKategori) return;
    const { data } = await sb.from("kategoriler").insert({ isletme_id: isletmeId, ad: yeniKategori }).select().single();
    setKategoriler([...kategoriler, data]); setYeniKategori(""); setKategoriModal(false);
  };

  const kategoriSil = async (id) => {
    await sb.from("kategoriler").delete().eq("id", id);
    setKategoriler(kategoriler.filter(k => k.id !== id));
  };

  const filtreliMenu = aktifKategori === "tum" ? menu : aktifKategori === "kategorisiz" ? menu.filter(m => !m.kategori_id) : menu.filter(m => m.kategori_id === aktifKategori);

  return (
    <div className="fade-in" style={{ padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontFamily: "Syne", fontSize: 20, fontWeight: 700 }}>Menü</span>
        <div style={{ display:"flex", gap:8 }}>
          <Btn small variant="ghost" onClick={() => setKategoriModal(true)}>🗂 Kategoriler</Btn>
          <Btn small onClick={() => { setForm({ ad:"",fiyat:"",malzemeler:[],kategori_id:"",fotograf_url:"" }); setModal("yeni"); }}>+ Ekle</Btn>
        </div>
      </div>

      {/* Kategori filtreleri */}
      <div style={{ display:"flex", gap:8, marginBottom:14, overflowX:"auto", paddingBottom:4 }}>
        {[{id:"tum",ad:"Tümü"}, {id:"kategorisiz",ad:"Kategorisiz"}, ...kategoriler].map(k => (
          <button key={k.id} onClick={() => setAktifKategori(k.id)}
            style={{ background: aktifKategori===k.id ? C.accent : C.card, color: aktifKategori===k.id ? "#000":"#fff", border:`1px solid ${aktifKategori===k.id?C.accent:C.border}`, borderRadius:20, padding:"6px 14px", fontSize:13, cursor:"pointer", whiteSpace:"nowrap", fontWeight: aktifKategori===k.id?600:400 }}>
            {k.ad}
          </button>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtreliMenu.map(m => {
          const kat = kategoriler.find(k => k.id === m.kategori_id);
          return (
            <Card key={m.id}>
              <div style={{ display: "flex", gap:12 }}>
                {m.fotograf_url
                  ? <img src={m.fotograf_url} style={{ width:64, height:64, borderRadius:10, objectFit:"cover", flexShrink:0 }} />
                  : <div style={{ width:64, height:64, borderRadius:10, background:C.surface, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>🍽️</div>
                }
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <div style={{ fontWeight: 600 }}>{m.ad}</div>
                    <span style={{ color: C.accent, fontWeight: 700 }}>₺{m.fiyat}</span>
                  </div>
                  {kat && <Badge color={C.muted}>{kat.ad}</Badge>}
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    <Btn small variant="ghost" onClick={() => { setForm({ ad:m.ad,fiyat:m.fiyat,malzemeler:m.malzemeler||[],kategori_id:m.kategori_id||"",fotograf_url:m.fotograf_url||"" }); setModal(m.id); }}>✏️</Btn>
                    <Btn small variant="danger" onClick={() => sil(m.id)}>🗑</Btn>
                  </div>
                </div>
              </div>
            </Card>
          );
        })}
        {filtreliMenu.length === 0 && <div style={{ color:C.muted, textAlign:"center", padding:40 }}>Bu kategoride ürün yok</div>}
      </div>

      {modal && (
        <Modal title={modal === "yeni" ? "Yeni Ürün" : "Düzenle"} onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {/* Fotoğraf */}
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div onClick={() => fotografRef.current.click()}
                style={{ width:72, height:72, borderRadius:12, border:`2px dashed ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", overflow:"hidden", background:C.surface, flexShrink:0 }}>
                {form.fotograf_url
                  ? <img src={form.fotograf_url} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                  : <span style={{ fontSize:28 }}>📷</span>}
              </div>
              <div>
                <div style={{ fontWeight:600, fontSize:13, marginBottom:4 }}>Ürün Fotoğrafı</div>
                <Btn small variant="ghost" onClick={() => fotografRef.current.click()} disabled={fotografYukleniyor}>
                  {fotografYukleniyor ? "Yükleniyor..." : "Fotoğraf Seç"}
                </Btn>
                <input ref={fotografRef} type="file" accept="image/*" onChange={fotografYukle} style={{ display:"none" }} />
              </div>
            </div>
            <input placeholder="Ürün adı" value={form.ad} onChange={e => setForm({...form, ad: e.target.value})} />
            <input type="number" placeholder="Satış fiyatı ₺" value={form.fiyat} onChange={e => setForm({...form, fiyat: e.target.value})} />
            <select value={form.kategori_id} onChange={e => setForm({...form, kategori_id: e.target.value})}>
              <option value="">Kategori seç (isteğe bağlı)</option>
              {kategoriler.map(k => <option key={k.id} value={k.id}>{k.ad}</option>)}
            </select>
            <div style={{ fontSize: 13, color: C.muted }}>Malzeme Reçetesi (isteğe bağlı)</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {(form.malzemeler||[]).map(ml => {
                const mObj = malzemeler.find(x => x.id === ml.id);
                return mObj ? (
                  <Badge key={ml.id} color={C.accent}>
                    {mObj.ad} ×{ml.qty}
                    <button onClick={() => setForm({...form, malzemeler: form.malzemeler.filter(x => x.id !== ml.id)})}
                      style={{ background:"none",border:"none",color:C.accent,cursor:"pointer",marginLeft:4 }}>✕</button>
                  </Badge>
                ) : null;
              })}
            </div>
            {malzemeler.length > 0 && (
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr auto", gap: 8, alignItems: "center" }}>
                <select value={malzForm.id} onChange={e => setMalzForm({...malzForm, id: e.target.value})}>
                  <option value="">Malzeme seç</option>
                  {malzemeler.map(m => <option key={m.id} value={m.id}>{m.ad}</option>)}
                </select>
                <input type="number" placeholder="Miktar" value={malzForm.qty} onChange={e => setMalzForm({...malzForm, qty: e.target.value})} />
                <Btn small variant="ghost" onClick={malzEkle}>+</Btn>
              </div>
            )}
            <Btn onClick={kaydet}>Kaydet</Btn>
          </div>
        </Modal>
      )}

      {kategoriModal && (
        <Modal title="🗂 Kategori Yönetimi" onClose={() => setKategoriModal(false)}>
          <div style={{ display:"flex", gap:8, marginBottom:16 }}>
            <input placeholder="Yeni kategori adı" value={yeniKategori} onChange={e => setYeniKategori(e.target.value)} />
            <Btn small onClick={kategoriEkle}>Ekle</Btn>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {kategoriler.map(k => (
              <div key={k.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontWeight:600 }}>{k.ad}</span>
                <Btn small variant="danger" onClick={() => kategoriSil(k.id)}>🗑</Btn>
              </div>
            ))}
            {kategoriler.length === 0 && <div style={{ color:C.muted, textAlign:"center", padding:20 }}>Henüz kategori yok</div>}
          </div>
        </Modal>
      )}
    </div>
  );
// ─── MUTFAK EKRANI ───────────────────────────────────────────────────────────
const MutfakEkrani = ({ isletmeId }) => {
  const [adisyonlar, setAdisyonlar] = useState([]);
  const [masalar, setMasalar] = useState([]);

  useEffect(() => {
    veriYukle();
    // Her 10 saniyede otomatik güncelle
    const interval = setInterval(veriYukle, 10000);
    return () => clearInterval(interval);
  }, []);

  const veriYukle = async () => {
    const [{ data: a }, { data: m }] = await Promise.all([
      sb.from("adisyonlar").select("*").eq("isletme_id", isletmeId).eq("durum", "acik").order("acilis_tarihi"),
      sb.from("masalar").select("*").eq("isletme_id", isletmeId),
    ]);
    setAdisyonlar(a?.filter(x => x.items?.length > 0) || []);
    setMasalar(m || []);
  };

  const durumGuncelle = async (adisyonId, durum) => {
    await sb.from("adisyonlar").update({ mutfak_durum: durum }).eq("id", adisyonId);
    setAdisyonlar(a => a.map(x => x.id === adisyonId ? {...x, mutfak_durum: durum} : x));
  };

  const masaAd = (masaId) => masalar.find(m => m.id === masaId)?.ad || "Bilinmeyen";

  const durumRenk = { bekliyor: C.red, hazirlaniyor: "#e8a830", hazir: C.green };
  const durumLabel = { bekliyor: "⏳ Bekliyor", hazirlaniyor: "👨‍🍳 Hazırlanıyor", hazir: "✅ Hazır" };

  return (
    <div style={{ padding: 16, background: C.bg, minHeight: "100vh" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <span style={{ fontFamily:"Syne", fontSize:22, fontWeight:800, color:C.accent }}>👨‍🍳 Mutfak Ekranı</span>
        <Btn small variant="ghost" onClick={veriYukle}>🔄 Yenile</Btn>
      </div>
      {adisyonlar.length === 0 && (
        <div style={{ textAlign:"center", padding:60, color:C.muted }}>
          <div style={{ fontSize:48, marginBottom:12 }}>✅</div>
          <div style={{ fontSize:18, fontWeight:600 }}>Tüm siparişler hazır!</div>
        </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:16 }}>
        {adisyonlar.map(a => {
          const durum = a.mutfak_durum || "bekliyor";
          const renk = durumRenk[durum];
          const sure = Math.floor((new Date() - new Date(a.acilis_tarihi)) / 60000);
          return (
            <div key={a.id} style={{ background:C.card, border:`2px solid ${renk}`, borderRadius:16, padding:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <span style={{ fontFamily:"Syne", fontSize:18, fontWeight:700 }}>{masaAd(a.masa_id)}</span>
                <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                  <span style={{ color:C.muted, fontSize:12 }}>{sure} dk</span>
                  <Badge color={renk}>{durumLabel[durum]}</Badge>
                </div>
              </div>
              {(a.items||[]).map((item, i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${C.border}`, fontSize:15 }}>
                  <span style={{ fontWeight:600 }}>{item.ad}</span>
                  <span style={{ color:C.accent, fontWeight:700 }}>×{item.qty}</span>
                </div>
              ))}
              {a.mutfak_not && <div style={{ color:C.muted, fontSize:13, marginTop:8, fontStyle:"italic" }}>📝 {a.mutfak_not}</div>}
              <div style={{ display:"flex", gap:8, marginTop:14 }}>
                {durum === "bekliyor" && <Btn variant="ghost" style={{ flex:1, background:"#e8a83022", color:"#e8a830", border:`1px solid #e8a83044` }} onClick={() => durumGuncelle(a.id, "hazirlaniyor")}>👨‍🍳 Hazırlanıyor</Btn>}
                {durum === "hazirlaniyor" && <Btn variant="success" style={{ flex:1 }} onClick={() => durumGuncelle(a.id, "hazir")}>✅ Hazır</Btn>}
                {durum === "hazir" && <div style={{ color:C.green, fontWeight:600, textAlign:"center", flex:1 }}>✅ Servise Hazır!</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

    </style></head><body>
      <div class="merkez bold">${isletme?.ad || "BurgerStock"}</div>
      <div class="merkez">${new Date().toLocaleString("tr-TR")}</div>
      <div class="cizgi"></div>
      <div class="satir"><span>Masa:</span><span>${masa}</span></div>
      <div class="cizgi"></div>
      ${items.map(i => `<div class="satir"><span>${i.ad} ×${i.qty}</span><span>₺${(i.fiyat*i.qty).toFixed(0)}</span></div>`).join("")}
      <div class="cizgi"></div>
      <div class="satir bold"><span>TOPLAM</span><span>₺${toplam.toFixed(0)}</span></div>
      <div class="satir"><span>Ödeme:</span><span>${odemeLabel[odemeTipi]||odemeTipi}</span></div>
      <div class="cizgi"></div>
      <div class="merkez">Teşekkür ederiz!</div>
    \x3C/body>\x3C/html>
  `;
  const pencere = window.open("", "_blank", "width=320,height=600");
  pencere.document.write(icerik);
  pencere.document.close();
  pencere.print();
};

// ─── MASA YÖNETİMİ + ADİSYON ────────────────────────────────────────────────
const Masalar = ({ isletmeId, kullaniciId, menu, malzemeler, setMalzemeler, setSatislar, accent, kategoriler }) => {
  const [masalar, setMasalar] = useState([]);
  const [adisyonlar, setAdisyonlar] = useState([]);
  const [seciliMasa, setSeciliMasa] = useState(null);
  const [adisyonEkran, setAdisyonEkran] = useState(false);
  const [masaModal, setMasaModal] = useState(false);
  const [yeniMasaAd, setYeniMasaAd] = useState("");
  const [odemeModal, setOdemeModal] = useState(false);
  const [yukleniyor, setYukleniyor] = useState(true);
  const [aktifKat, setAktifKat] = useState("tum");

  useEffect(() => { veriYukle(); }, []);

  const veriYukle = async () => {
    setYukleniyor(true);
    const [{ data: m }, { data: a }] = await Promise.all([
      sb.from("masalar").select("*").eq("isletme_id", isletmeId).order("id"),
      sb.from("adisyonlar").select("*").eq("isletme_id", isletmeId).eq("durum", "acik"),
    ]);
    setMasalar(m || []); setAdisyonlar(a || []);
    setYukleniyor(false);
  };

  const masaEkle = async () => {
    if (!yeniMasaAd) return;
    const { data } = await sb.from("masalar").insert({ isletme_id: isletmeId, ad: yeniMasaAd, durum: "bos" }).select().single();
    setMasalar(m => [...m, data]); setMasaModal(false); setYeniMasaAd("");
  };

  const masaSil = async (id) => {
    await sb.from("masalar").delete().eq("id", id);
    setMasalar(m => m.filter(x => x.id !== id));
  };

  const adisyonAc = async (masa) => {
    const mevcutAdisyon = adisyonlar.find(a => a.masa_id === masa.id);
    if (mevcutAdisyon) { setSeciliMasa({ ...masa, adisyon: mevcutAdisyon }); setAdisyonEkran(true); return; }
    const { data } = await sb.from("adisyonlar").insert({ isletme_id: isletmeId, masa_id: masa.id, kullanici_id: kullaniciId, items: [], durum: "acik", toplam: 0 }).select().single();
    await sb.from("masalar").update({ durum: "dolu" }).eq("id", masa.id);
    setMasalar(m => m.map(x => x.id === masa.id ? {...x, durum: "dolu"} : x));
    setAdisyonlar(a => [...a, data]);
    setSeciliMasa({ ...masa, durum: "dolu", adisyon: data }); setAdisyonEkran(true);
  };

  const urunEkle = async (menuItem) => {
    const adisyon = seciliMasa.adisyon;
    const mevcutItems = adisyon.items || [];
    const var_ = mevcutItems.find(x => x.menuId === menuItem.id);
    const yeniItems = var_
      ? mevcutItems.map(x => x.menuId === menuItem.id ? {...x, qty: x.qty+1} : x)
      : [...mevcutItems, { menuId: menuItem.id, ad: menuItem.ad, fiyat: menuItem.fiyat, qty: 1 }];
    const yeniToplam = yeniItems.reduce((t, x) => t + x.fiyat * x.qty, 0);
    await sb.from("adisyonlar").update({ items: yeniItems, toplam: yeniToplam }).eq("id", adisyon.id);
    const yeniAdisyon = { ...adisyon, items: yeniItems, toplam: yeniToplam };
    setAdisyonlar(a => a.map(x => x.id === adisyon.id ? yeniAdisyon : x));
    setSeciliMasa(m => ({ ...m, adisyon: yeniAdisyon }));
  };

  const urunCikar = async (menuId) => {
    const adisyon = seciliMasa.adisyon;
    const yeniItems = (adisyon.items||[]).map(x => x.menuId===menuId ? {...x,qty:x.qty-1} : x).filter(x=>x.qty>0);
    const yeniToplam = yeniItems.reduce((t, x) => t + x.fiyat * x.qty, 0);
    await sb.from("adisyonlar").update({ items: yeniItems, toplam: yeniToplam }).eq("id", adisyon.id);
    const yeniAdisyon = { ...adisyon, items: yeniItems, toplam: yeniToplam };
    setAdisyonlar(a => a.map(x => x.id === adisyon.id ? yeniAdisyon : x));
    setSeciliMasa(m => ({ ...m, adisyon: yeniAdisyon }));
  };

  const hesapKapat = async (odemeTipi) => {
    const adisyon = seciliMasa.adisyon;
    if (!adisyon.items?.length) return;
    const yeniMalzemeler = malzemeler.map(m => {
      let azalan = 0;
      (adisyon.items||[]).forEach(item => {
        const mi = menu.find(x => x.id === item.menuId);
        const ml = (mi?.malzemeler||[]).find(x => x.id === m.id);
        if (ml) azalan += ml.qty * item.qty;
      });
      return { ...m, stok: Math.max(0, m.stok - azalan) };
    });
    for (const m of yeniMalzemeler) await sb.from("malzemeler").update({ stok: m.stok }).eq("id", m.id);
    setMalzemeler(yeniMalzemeler);
    await sb.from("adisyonlar").update({ durum: "kapali", kapanis_tarihi: new Date().toISOString(), odeme_tipi: odemeTipi }).eq("id", adisyon.id);
    const { data: satis } = await sb.from("satislar").insert({ isletme_id: isletmeId, kullanici_id: kullaniciId, items: adisyon.items, toplam: adisyon.toplam, tarih: new Date().toISOString(), masa: seciliMasa.ad, odeme_tipi: odemeTipi }).select().single();
    setSatislar(s => [...s, satis]);
    await sb.from("masalar").update({ durum: "bos" }).eq("id", seciliMasa.id);
    setMasalar(m => m.map(x => x.id === seciliMasa.id ? {...x, durum: "bos"} : x));
    setAdisyonlar(a => a.filter(x => x.id !== adisyon.id));
    // Fiş yazdır
    fisYazdir(seciliMasa.ad, adisyon.items, adisyon.toplam, null, odemeTipi);
    setOdemeModal(false); setAdisyonEkran(false); setSeciliMasa(null);
  };

  const masaDurumRenk = (masa) => {
    const adisyon = adisyonlar.find(a => a.masa_id === masa.id);
    if (!adisyon) return { bg: C.card, border: C.border, label: "Boş", color: C.muted };
    if (adisyon.items?.length > 0) return { bg: C.accent+"11", border: C.accent+"44", label: `₺${adisyon.toplam}`, color: C.accent };
    return { bg: C.green+"11", border: C.green+"44", label: "Açık", color: C.green };
  };

  if (yukleniyor) return <Spinner />;

  // Adisyon ekranı
  if (adisyonEkran && seciliMasa) {
    const adisyon = seciliMasa.adisyon;
    const items = adisyon?.items || [];
    const toplam = items.reduce((t, x) => t + x.fiyat * x.qty, 0);
    return (
      <div className="fade-in" style={{ padding: 16 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
          <Btn small variant="ghost" onClick={() => { setAdisyonEkran(false); setSeciliMasa(null); }}>← Geri</Btn>
          <span style={{ fontFamily:"Syne", fontSize:18, fontWeight:700 }}>🪑 {seciliMasa.ad}</span>
        </div>

        {/* Kategori filtreleri */}
        <div style={{ display:"flex", gap:8, marginBottom:12, overflowX:"auto", paddingBottom:4 }}>
          {[{id:"tum",ad:"Tümü"}, ...kategoriler].map(k => (
            <button key={k.id} onClick={() => setAktifKat(k.id)}
              style={{ background: aktifKat===k.id ? (accent||C.accent) : C.card, color: aktifKat===k.id ? "#000":"#fff", border:`1px solid ${aktifKat===k.id?(accent||C.accent):C.border}`, borderRadius:20, padding:"6px 14px", fontSize:12, cursor:"pointer", whiteSpace:"nowrap", fontWeight: aktifKat===k.id?600:400 }}>
              {k.ad}
            </button>
          ))}
        </div>

        {/* Menü */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
          {menu.filter(m => aktifKat === "tum" || m.kategori_id === aktifKat).map(m => (
            <div key={m.id} onClick={() => urunEkle(m)}
              style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", cursor:"pointer", transition:"all 0.15s" }}>
              {m.fotograf_url
                ? <img src={m.fotograf_url} style={{ width:"100%", height:80, objectFit:"cover" }} />
                : <div style={{ width:"100%", height:80, background:C.surface, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>🍽️</div>}
              <div style={{ padding:"8px 10px" }}>
                <div style={{ fontWeight:600, fontSize:13 }}>{m.ad}</div>
                <div style={{ color: accent||C.accent, fontWeight:700, fontSize:14, marginTop:2 }}>₺{m.fiyat}</div>
              </div>
            </div>
          ))}
          {menu.filter(m => aktifKat === "tum" || m.kategori_id === aktifKat).length === 0 && (
            <div style={{ color:C.muted, gridColumn:"1/-1", textAlign:"center", padding:30 }}>Bu kategoride ürün yok</div>
          )}
        </div>

        {/* Adisyon */}
        {items.length > 0 ? (
          <Card style={{ border:`1px solid ${accent||C.accent}44` }}>
            <div style={{ fontWeight:600, marginBottom:12, color: accent||C.accent }}>🧾 Adisyon</div>
            {items.map(item => (
              <div key={item.menuId} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:14 }}>{item.ad}</span>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ color:C.muted, fontSize:13 }}>₺{(item.fiyat*item.qty).toFixed(0)}</span>
                  <button onClick={() => urunCikar(item.menuId)} style={{ background:C.border,border:"none",color:C.text,borderRadius:6,width:26,height:26,cursor:"pointer" }}>−</button>
                  <span style={{ width:20,textAlign:"center",fontWeight:600 }}>{item.qty}</span>
                  <button onClick={() => urunEkle(menu.find(m=>m.id===item.menuId))} style={{ background:accent||C.accent,border:"none",color:"#000",borderRadius:6,width:26,height:26,cursor:"pointer" }}>+</button>
                </div>
              </div>
            ))}
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:14, alignItems:"center" }}>
              <span style={{ fontFamily:"Syne", fontSize:22, fontWeight:700 }}>₺{toplam.toFixed(0)}</span>
              <Btn onClick={() => setOdemeModal(true)} style={{ background: accent||C.accent, color:"#000" }}>💳 Hesap Kapat</Btn>
            </div>
          </Card>
        ) : (
          <div style={{ color:C.muted, textAlign:"center", padding:40 }}>Henüz ürün eklenmedi</div>
        )}

        {odemeModal && (
          <Modal title="Ödeme Yöntemi" onClose={() => setOdemeModal(false)}>
            <div style={{ fontSize:14, color:C.muted, marginBottom:16 }}>Toplam: <span style={{ color:C.accent, fontWeight:700, fontSize:20 }}>₺{toplam.toFixed(0)}</span></div>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <Btn onClick={() => hesapKapat("nakit")} variant="success">💵 Nakit</Btn>
              <Btn onClick={() => hesapKapat("kart")} variant="ghost">💳 Kredi/Banka Kartı</Btn>
              <Btn onClick={() => hesapKapat("havale")} variant="ghost">📱 Havale/QR</Btn>
            </div>
          </Modal>
        )}
      </div>
    );
  }

  // Masa listesi
  return (
    <div className="fade-in" style={{ padding: 16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <span style={{ fontFamily:"Syne", fontSize:20, fontWeight:700 }}>Masalar</span>
        <Btn small onClick={() => setMasaModal(true)}>+ Masa Ekle</Btn>
      </div>

      {/* Özet */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
        <Card><div style={{ fontSize:20, fontWeight:700, color:C.green }}>{masalar.filter(m=>!adisyonlar.find(a=>a.masa_id===m.id)).length}</div><div style={{ fontSize:11, color:C.muted }}>Boş</div></Card>
        <Card><div style={{ fontSize:20, fontWeight:700, color:accent||C.accent }}>{adisyonlar.length}</div><div style={{ fontSize:11, color:C.muted }}>Dolu</div></Card>
        <Card><div style={{ fontSize:20, fontWeight:700, color:C.text }}>₺{adisyonlar.reduce((t,a)=>t+(a.toplam||0),0).toFixed(0)}</div><div style={{ fontSize:11, color:C.muted }}>Açık</div></Card>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        {masalar.map(masa => {
          const durum = masaDurumRenk(masa);
          return (
            <div key={masa.id} onClick={() => adisyonAc(masa)}
              style={{ background: durum.bg, border:`2px solid ${durum.border}`, borderRadius:16, padding:16, cursor:"pointer", transition:"all 0.2s" }}>
              <div style={{ fontFamily:"Syne", fontSize:16, fontWeight:700 }}>{masa.ad}</div>
              <div style={{ fontSize:13, color:durum.color, marginTop:4, fontWeight:600 }}>{durum.label}</div>
              <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{masa.kapasite} kişilik</div>
            </div>
          );
        })}
      </div>

      {masalar.length === 0 && (
        <div style={{ color:C.muted, textAlign:"center", padding:40 }}>
          <div style={{ fontSize:40, marginBottom:8 }}>🪑</div>
          Henüz masa yok, ekle!
        </div>
      )}

      {masaModal && (
        <Modal title="Yeni Masa Ekle" onClose={() => setMasaModal(false)}>
          <input placeholder="Masa adı (örn: Masa 1, Teras 2...)" value={yeniMasaAd} onChange={e => setYeniMasaAd(e.target.value)} style={{ marginBottom:12 }} />
          <Btn onClick={masaEkle}>Ekle</Btn>
        </Modal>
      )}
    </div>
  );
};

// ─── RAPORLAR ───────────────────────────────────────────────────────────────
const Raporlar = ({ satislar, menu, malzemeler, isletme }) => {
  const [sekme, setSekme] = useState("satis");
  const [filtre, setFiltre] = useState("bugun");
  const simdi = new Date();

  const satirSatislar = satislar.filter(s => !s.tip || s.tip !== "zayi");
  const zayiler = satislar.filter(s => s.tip === "zayi");

  const f = satirSatislar.filter(s => {
    const t = new Date(s.tarih);
    if (filtre === "bugun") return t.toDateString() === simdi.toDateString();
    if (filtre === "hafta") return (simdi - t) < 7*24*3600*1000;
    if (filtre === "ay") return t.getMonth() === simdi.getMonth() && t.getFullYear() === simdi.getFullYear();
    return true;
  });
  const fz = zayiler.filter(s => {
    const t = new Date(s.tarih);
    if (filtre === "bugun") return t.toDateString() === simdi.toDateString();
    if (filtre === "hafta") return (simdi - t) < 7*24*3600*1000;
    if (filtre === "ay") return t.getMonth() === simdi.getMonth() && t.getFullYear() === simdi.getFullYear();
    return true;
  });

  const ciro = f.reduce((t, s) => t + s.toplam, 0);
  const sayac = {};
  f.forEach(s => (s.items||[]).forEach(i => { sayac[i.menuId] = (sayac[i.menuId]||0) + i.qty; }));

  const excelIndir = () => {
    const filtrAd = { bugun:"Bugün", hafta:"Son 7 Gün", ay:"Bu Ay", tum:"Tüm Zamanlar" }[filtre];
    const rows = [];
    rows.push([`${isletme?.ad || "BurgerStock"} - Rapor`]);
    rows.push([`Dönem: ${filtrAd}`, `Tarih: ${new Date().toLocaleDateString("tr-TR")}`]);
    rows.push([]);
    rows.push(["SATIŞ ÖZETI"]);
    rows.push(["Toplam Ciro", `₺${ciro.toLocaleString()}`]);
    rows.push(["Sipariş Sayısı", f.length]);
    rows.push(["Ortalama Sipariş", f.length > 0 ? `₺${(ciro/f.length).toFixed(0)}` : "₺0"]);
    rows.push([]);
    rows.push(["ÜRÜN BAZLI SATIŞLAR"]);
    rows.push(["Ürün", "Adet", "Birim Fiyat", "Toplam"]);
    menu.forEach(m => {
      const adet = sayac[m.id] || 0;
      rows.push([m.ad, adet, `₺${m.fiyat}`, `₺${(adet * m.fiyat).toLocaleString()}`]);
    });
    rows.push([]);
    rows.push(["ZAYİ GEÇMİŞİ"]);
    rows.push(["Tarih", "Malzeme", "Miktar", "Sebep"]);
    [...fz].reverse().forEach(z => {
      (z.items||[]).forEach(i => {
        rows.push([new Date(z.tarih).toLocaleString("tr-TR"), i.ad?.replace("ZAYİ: ",""), i.qty, i.sebep || "-"]);
      });
    });
    rows.push([]);
    rows.push(["STOK DURUMU"]);
    rows.push(["Malzeme", "Birim", "Mevcut Stok", "Min. Stok", "Durum"]);
    malzemeler.forEach(m => {
      rows.push([m.ad, m.birim, m.stok, m.min_stok, m.stok <= m.min_stok ? "⚠️ Düşük" : "✅ Normal"]);
    });
    const csvContent = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${isletme?.ad || "BurgerStock"}-Rapor-${filtrAd}-${new Date().toLocaleDateString("tr-TR").replace(/\//g,"-")}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="fade-in" style={{ padding: 16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <span style={{ fontFamily:"Syne", fontSize:20, fontWeight:700 }}>Raporlar</span>
        <Btn small onClick={excelIndir}>📥 Excel İndir</Btn>
      </div>

      {/* Sekme */}
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {[["satis","📈 Satışlar"],["zayi","🗑 Zayi Geçmişi"]].map(([v,l]) => (
          <button key={v} onClick={() => setSekme(v)}
            style={{ background: sekme===v ? C.accent : C.card, color: sekme===v ? "#000":"#fff", border:`1px solid ${sekme===v?C.accent:C.border}`, borderRadius:20, padding:"7px 16px", fontSize:13, cursor:"pointer", fontWeight: sekme===v ? 600:400 }}>
            {l}
          </button>
        ))}
      </div>

      {/* Dönem filtresi */}
      <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
        {[["bugun","Bugün"],["hafta","7 Gün"],["ay","Bu Ay"],["tum","Tümü"]].map(([v,l]) => (
          <button key={v} onClick={() => setFiltre(v)}
            style={{ background: filtre===v ? C.surface : "transparent", color: filtre===v ? C.text : C.muted, border:`1px solid ${filtre===v?C.border:"transparent"}`, borderRadius:20, padding:"5px 12px", fontSize:12, cursor:"pointer" }}>
            {l}
          </button>
        ))}
      </div>

      {sekme === "satis" && (
        <>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:14 }}>
            <Card><div style={{ fontSize:20, fontWeight:700, color:C.green }}>₺{ciro.toLocaleString()}</div><div style={{ fontSize:11, color:C.muted }}>Ciro</div></Card>
            <Card><div style={{ fontSize:20, fontWeight:700, color:C.accent }}>{f.length}</div><div style={{ fontSize:11, color:C.muted }}>Sipariş</div></Card>
            <Card><div style={{ fontSize:20, fontWeight:700, color:C.text }}>₺{f.length > 0 ? (ciro/f.length).toFixed(0) : 0}</div><div style={{ fontSize:11, color:C.muted }}>Ortalama</div></Card>
          </div>
          <Card style={{ marginBottom:14 }}>
            <div style={{ fontSize:13, color:C.muted, marginBottom:12 }}>ÜRÜN BAZLI</div>
            {menu.map(m => (
              <div key={m.id} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:`1px solid ${C.border}`, fontSize:14 }}>
                <span>{m.ad}</span>
                <div style={{ display:"flex", gap:12 }}>
                  <span style={{ color:C.muted }}>{sayac[m.id]||0} adet</span>
                  <span style={{ color:C.accent }}>₺{((sayac[m.id]||0)*m.fiyat).toLocaleString()}</span>
                </div>
              </div>
            ))}
          </Card>
          <Card>
            <div style={{ fontSize:13, color:C.muted, marginBottom:12 }}>SON SİPARİŞLER</div>
            {[...f].reverse().slice(0,10).map(s => (
              <div key={s.id} style={{ padding:"8px 0", borderBottom:`1px solid ${C.border}`, fontSize:13 }}>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ color:C.muted }}>{new Date(s.tarih).toLocaleString("tr-TR")}</span>
                  <span style={{ color:C.accent, fontWeight:600 }}>₺{s.toplam}</span>
                </div>
                <div style={{ color:C.muted, fontSize:12, marginTop:2 }}>{(s.items||[]).map(i=>`${i.ad} ×${i.qty}`).join(", ")}</div>
              </div>
            ))}
            {f.length === 0 && <div style={{ color:C.muted, textAlign:"center", padding:20 }}>Bu dönemde satış yok</div>}
          </Card>
        </>
      )}

      {sekme === "zayi" && (
        <Card>
          <div style={{ fontSize:13, color:C.muted, marginBottom:12 }}>ZAYİ GEÇMİŞİ</div>
          {[...fz].reverse().map(z => (
            (z.items||[]).map((item, i) => (
              <div key={`${z.id}-${i}`} style={{ padding:"10px 0", borderBottom:`1px solid ${C.border}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:14, color:C.red }}>
                      {String(item.ad || "").replace("ZAYİ: ", "")}
                    </div>
                    {item.sebep && <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Sebep: {item.sebep}</div>}
                  </div>
                  <Badge color={C.red}>{item.qty} adet</Badge>
                </div>
                <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>{new Date(z.tarih).toLocaleString("tr-TR")}</div>
              </div>
            ))
          ))}
          {fz.length === 0 && <div style={{ color:C.muted, textAlign:"center", padding:20 }}>Bu dönemde zayi kaydı yok</div>}
        </Card>
      )}
    </div>
  );
};

// ─── ANA UYGULAMA ────────────────────────────────────────────────────────────
function App() {
  const [kullanici, setKullanici] = useState(null);
  const [yukleniyor, setYukleniyor] = useState(true);
  const [sayfa, setSayfa] = useState("dashboard");
  const [malzemeler, setMalzemeler] = useState([]);
  const [menu, setMenu] = useState([]);
  const [satislar, setSatislar] = useState([]);
  const [kategoriler, setKategoriler] = useState([]);
  const [tema, setTema] = useState(() => localStorage.getItem("tema") || "dark");
  const [cevrimici, setCevrimici] = useState(navigator.onLine);

  // Tema renkleri dinamik
  useEffect(() => {
    const r = document.documentElement.style;
    if (tema === "light") {
      r.setProperty("--bg", "#f5f5f0");
      r.setProperty("--surface", "#ffffff");
      r.setProperty("--card", "#ffffff");
      r.setProperty("--border", "#e0ddd8");
      r.setProperty("--text", "#1a1814");
      document.body.style.background = "#f5f5f0";
      document.body.style.color = "#1a1814";
    } else {
      r.setProperty("--bg", "#0f0e0c");
      r.setProperty("--surface", "#1a1814");
      r.setProperty("--card", "#201e1a");
      r.setProperty("--border", "#2e2b26");
      r.setProperty("--text", "#f0ebe3");
      document.body.style.background = "#0f0e0c";
      document.body.style.color = "#f0ebe3";
    }
    localStorage.setItem("tema", tema);
  }, [tema]);

  useEffect(() => {
    const online = () => setCevrimici(true);
    const offline = () => setCevrimici(false);
    window.addEventListener("online", online);
    window.addEventListener("offline", offline);
    return () => { window.removeEventListener("online", online); window.removeEventListener("offline", offline); };
  }, []);

  useEffect(() => {
    sb.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        const { data } = await sb.from("kullanicilar").select("*, isletmeler(*)").eq("id", session.user.id).single();
        if (data) {
          setKullanici(data);
          if (navigator.onLine) {
            await veriYukle(data.isletme_id);
          } else {
            // Offline: cache'den yükle
            const m = localCache.get("malzemeler_" + data.isletme_id);
            const mn = localCache.get("menu_" + data.isletme_id);
            const s = localCache.get("satislar_" + data.isletme_id);
            if (m) setMalzemeler(m);
            if (mn) setMenu(mn);
            if (s) setSatislar(s);
          }
        }
      }
      setYukleniyor(false);
    });
  }, []);

  // İnternet gelince cache'i güncelle
  useEffect(() => {
    if (cevrimici && kullanici) veriYukle(kullanici.isletme_id);
  }, [cevrimici]);

  const veriYukle = async (isletmeId) => {
    try {
      const [{ data: m }, { data: mn }, { data: s }, { data: k }] = await Promise.all([
        sb.from("malzemeler").select("*").eq("isletme_id", isletmeId),
        sb.from("menu").select("*").eq("isletme_id", isletmeId),
        sb.from("satislar").select("*").eq("isletme_id", isletmeId).order("tarih", { ascending: false }).limit(100),
        sb.from("kategoriler").select("*").eq("isletme_id", isletmeId).order("sira"),
      ]);
      setMalzemeler(m || []); setMenu(mn || []); setSatislar(s || []); setKategoriler(k || []);
      localCache.set("malzemeler_" + isletmeId, m || []);
      localCache.set("menu_" + isletmeId, mn || []);
      localCache.set("satislar_" + isletmeId, s || []);
    } catch(e) {
      const m = localCache.get("malzemeler_" + isletmeId);
      const mn = localCache.get("menu_" + isletmeId);
      const s = localCache.get("satislar_" + isletmeId);
      if (m) setMalzemeler(m);
      if (mn) setMenu(mn);
      if (s) setSatislar(s);
    }
  };

  const handleGiris = async (k) => { setKullanici(k); await veriYukle(k.isletme_id); };

  if (yukleniyor) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background: C.bg }}>
      <Spinner />
    </div>
  );

  if (!kullanici) return <GirisEkrani onGiris={handleGiris} />;

  const isletme = kullanici.isletmeler;
  const accent = isletme?.renk || C.accent;
  const dusukStok = malzemeler.filter(m => m.stok <= m.min_stok).length;
  const mudur = kullanici.rol === "mudur";

  const nav = [
    { id: "dashboard", icon: "📊", label: "Özet" },
    { id: "masalar", icon: "🪑", label: "Masalar" },
    { id: "malzemeler", icon: "📦", label: "Stok", badge: dusukStok },
    ...(mudur ? [{ id: "menu", icon: "🍔", label: "Menü" }] : []),
    ...(mudur ? [{ id: "mutfak", icon: "👨‍🍳", label: "Mutfak" }] : []),
    ...(mudur ? [{ id: "qrmenu", icon: "📱", label: "QR" }] : []),
    ...(mudur ? [{ id: "raporlar", icon: "📈", label: "Rapor" }] : []),
    { id: "ayarlar", icon: "⚙️", label: "Ayarlar" },
  ];

  return (
    <div style={{ maxWidth: 540, margin: "0 auto", minHeight: "100vh", background: tema==="light" ? "#f5f5f0" : C.bg, paddingBottom: 80 }}>
      {!cevrimici && (
        <div style={{ background:"#e8a83022", borderBottom:`1px solid #e8a83044`, color:"#e8a830", padding:"8px 16px", fontSize:13, textAlign:"center" }}>
          📡 Çevrimdışı — son kaydedilen veriler gösteriliyor
        </div>
      )}
      {sayfa === "dashboard" && <Dashboard isletme={isletme} malzemeler={malzemeler} menu={menu} satislar={satislar} />}
      {sayfa === "masalar" && <Masalar isletmeId={kullanici.isletme_id} kullaniciId={kullanici.id} menu={menu} malzemeler={malzemeler} setMalzemeler={setMalzemeler} setSatislar={setSatislar} accent={accent} kategoriler={kategoriler} />}
      {sayfa === "malzemeler" && <Malzemeler isletmeId={kullanici.isletme_id} malzemeler={malzemeler} setMalzemeler={setMalzemeler} cevrimici={cevrimici} />}
      {sayfa === "menu" && mudur && <Menu isletmeId={kullanici.isletme_id} menu={menu} setMenu={setMenu} malzemeler={malzemeler} kategoriler={kategoriler} setKategoriler={setKategoriler} />}
      {sayfa === "mutfak" && mudur && <MutfakEkrani isletmeId={kullanici.isletme_id} />}
      {sayfa === "qrmenu" && mudur && <QRMenu isletme={isletme} menu={menu} kategoriler={kategoriler} />}
      {sayfa === "raporlar" && mudur && <Raporlar satislar={satislar} menu={menu} malzemeler={malzemeler} isletme={isletme} />}
      {sayfa === "ayarlar" && <Ayarlar kullanici={kullanici} setKullanici={setKullanici} tema={tema} setTema={setTema} />}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:540, background: tema==="light" ? "#ffffff" : C.surface, borderTop:`1px solid ${tema==="light"?"#e0ddd8":C.border}`, display:"flex", padding:"8px 0 12px" }}>
        {nav.map(n => (
          <button key={n.id} onClick={() => setSayfa(n.id)}
            style={{ flex:1, background:"none", border:"none", display:"flex", flexDirection:"column", alignItems:"center", gap:2, cursor:"pointer", position:"relative" }}>
            <span style={{ fontSize:20 }}>{n.icon}</span>
            <span style={{ fontSize:11, color: sayfa===n.id ? accent : C.muted, fontWeight: sayfa===n.id ? 600:400 }}>{n.label}</span>
            {n.badge > 0 && <span className="badge-pulse" style={{ position:"absolute", top:0, right:"20%", background:C.red, color:"#fff", borderRadius:"50%", width:16, height:16, fontSize:10, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>{n.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
